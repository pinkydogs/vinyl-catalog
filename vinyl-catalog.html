<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>КРУГ — каталог пластинок</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.21.3/index.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg: #15130f;
    --bg-raised: #1d1a14;
    --bg-card: #211e17;
    --groove: #2a261d;
    --paper: #ece4d3;
    --paper-dim: #b9ad95;
    --ink: #ece4d3;
    --ink-dim: #8d8472;
    --amber: #d98c2b;
    --amber-bright: #f0a93e;
    --rust: #b6502f;
    --good: #6f9456;
    --line: #34302434;
    --hairline: #ffffff14;
    --font-display: 'Spectral', Georgia, 'Times New Roman', serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --font-body: 'Inter', -apple-system, sans-serif;
  }

  @font-face {
    font-family: 'Spectral';
    src: local('Georgia');
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html, body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }

  body{
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    background-image:
      radial-gradient(circle at 50% -10%, #2c2719 0%, transparent 60%);
  }

  button{ font-family: inherit; border:none; background:none; color:inherit; cursor:pointer; }
  input, select, textarea{ font-family: inherit; }

  /* ---------- header ---------- */
  .topbar{
    position: sticky;
    top:0;
    z-index:20;
    padding: 18px 20px 14px;
    background: linear-gradient(180deg, var(--bg) 70%, transparent);
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .brand .mark{
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--paper);
  }
  .brand .mark .ring{
    color: var(--amber);
  }
  .brand .sub{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .count-pill{
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--ink-dim);
    text-align:right;
    line-height:1.5;
  }
  .count-pill b{
    color: var(--paper);
    font-size:13px;
  }

  /* ---------- tab nav ---------- */
  .tabs{
    display:flex;
    gap: 4px;
    padding: 0 20px;
    margin-top: 4px;
  }
  .tab{
    flex:1;
    padding: 10px 0;
    text-align:center;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-dim);
    border-bottom: 2px solid var(--groove);
    transition: color .15s, border-color .15s;
  }
  .tab.active{
    color: var(--amber-bright);
    border-color: var(--amber);
  }

  main{
    flex:1;
    padding: 18px 20px 100px;
    max-width: 560px;
    width:100%;
    margin: 0 auto;
  }

  .hidden{ display:none !important; }

  /* ---------- scan button (FAB) ---------- */
  .fab-wrap{
    position: fixed;
    bottom: 22px;
    left:0; right:0;
    display:flex;
    justify-content:center;
    z-index: 30;
    pointer-events:none;
  }
  .fab{
    pointer-events:auto;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--amber-bright), var(--amber) 55%, #8a5c1d 100%);
    box-shadow: 0 8px 24px #00000066, 0 0 0 6px var(--bg), 0 0 0 7px var(--groove);
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform .12s;
  }
  .fab:active{ transform: scale(0.92); }
  .fab svg{ width:26px; height:26px; }

  /* ---------- catalog list ---------- */
  .section-label{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin: 22px 0 10px;
    display:flex;
    align-items:center;
    gap: 10px;
  }
  .section-label::after{
    content:'';
    flex:1;
    height:1px;
    background: var(--hairline);
  }
  .section-label:first-child{ margin-top:0; }

  .search-row{
    display:flex;
    gap:8px;
    margin-bottom: 4px;
  }
  .search-input{
    flex:1;
    background: var(--bg-raised);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--ink);
    font-size: 14px;
  }
  .search-input::placeholder{ color: var(--ink-dim); }
  .search-input:focus{ outline:none; border-color: var(--amber); }

  .import-btn{
    width: 44px;
    height: 44px;
    flex-shrink:0;
    border-radius: 10px;
    background: var(--bg-raised);
    border: 1px solid var(--hairline);
    color: var(--ink-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    transition: border-color .15s, color .15s;
  }
  .import-btn svg{ width:18px; height:18px; }
  .import-btn:active{ border-color: var(--amber); color: var(--amber-bright); }

  .wh-filter-row{
    display:flex;
    gap: 7px;
    margin-bottom: 12px;
    overflow-x:auto;
    padding-bottom: 2px;
  }
  .wh-chip{
    flex-shrink:0;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.03em;
    padding: 8px 13px;
    border-radius: 20px;
    border: 1px solid var(--hairline);
    color: var(--ink-dim);
    background: var(--bg-raised);
    white-space:nowrap;
  }
  .wh-chip.active{
    border-color: var(--amber);
    color: var(--amber-bright);
    background: #d98c2b14;
  }

  .record-card{
    display:flex;
    gap: 14px;
    align-items:center;
    background: var(--bg-card);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor:pointer;
    transition: border-color .15s, transform .1s;
  }
  .record-card:active{ transform: scale(0.99); }
  .record-card.found{ border-color: #4a7a3a55; background: #1c2117; }
  .record-card.missing{ border-color: #b6502f55; }

  .disc-icon{
    width: 42px;
    height: 42px;
    border-radius: 50%;
    flex-shrink:0;
    background:
      radial-gradient(circle at center, var(--paper) 0 4px, #0c0b08 4.5px 5.5px, var(--groove) 6px 16px, #0c0b08 16.5px 17.5px, var(--groove) 18px 21px);
    box-shadow: inset 0 0 0 1px #00000080;
  }
  .record-info{ flex:1; min-width:0; }
  .record-artist{
    font-family: var(--font-display);
    font-size: 16px;
    font-weight:600;
    color: var(--paper);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .record-title{
    font-size: 13px;
    color: var(--ink-dim);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    margin-top:1px;
  }
  .record-meta{
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-dim);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .record-qty{
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--amber-bright);
    flex-shrink:0;
    text-align:right;
    line-height:1.3;
  }
  .record-qty .label{
    display:block;
    font-size: 8px;
    letter-spacing:0.1em;
    color: var(--ink-dim);
    text-transform:uppercase;
  }

  .empty-state{
    text-align:center;
    padding: 60px 20px;
    color: var(--ink-dim);
  }
  .empty-state .icon{ font-size:34px; margin-bottom:10px; opacity:0.6; }
  .empty-state .title{
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--paper-dim);
    margin-bottom:6px;
  }
  .empty-state .desc{ font-size: 13px; line-height:1.5; }

  /* ---------- scanner overlay ---------- */
  .scanner-overlay{
    position: fixed;
    inset:0;
    background: #000;
    z-index: 100;
    display:flex;
    flex-direction:column;
  }
  .scanner-video-wrap{
    position:relative;
    flex:1;
    overflow:hidden;
    background:#000;
  }
  #scanner-video{
    width:100%;
    height:100%;
    object-fit: cover;
  }
  .scan-frame{
    position:absolute;
    top:50%; left:50%;
    transform: translate(-50%,-50%);
    width: 78%;
    max-width: 360px;
    height: 130px;
    pointer-events:none;
  }
  .scan-frame .corner{
    position:absolute;
    width: 26px; height:26px;
    border: 3px solid var(--amber-bright);
  }
  .scan-frame .tl{ top:0; left:0; border-right:none; border-bottom:none; border-top-left-radius:6px;}
  .scan-frame .tr{ top:0; right:0; border-left:none; border-bottom:none; border-top-right-radius:6px;}
  .scan-frame .bl{ bottom:0; left:0; border-right:none; border-top:none; border-bottom-left-radius:6px;}
  .scan-frame .br{ bottom:0; right:0; border-left:none; border-top:none; border-bottom-right-radius:6px;}
  .scan-line{
    position:absolute;
    left:4%; right:4%;
    top:50%;
    height:2px;
    background: var(--rust);
    box-shadow: 0 0 8px var(--amber-bright);
    animation: scanmove 1.8s ease-in-out infinite;
  }
  @keyframes scanmove{
    0%,100%{ top: 14%; }
    50%{ top: 86%; }
  }
  .scanner-top{
    position:absolute;
    top:0; left:0; right:0;
    padding: 18px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:5;
    background: linear-gradient(180deg, #000000aa, transparent);
  }
  .scanner-mode-badge{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform:uppercase;
    color: var(--amber-bright);
    background: #00000080;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--amber);
  }
  .scanner-close{
    width:36px; height:36px;
    border-radius:50%;
    background:#00000080;
    display:flex; align-items:center; justify-content:center;
    color: var(--paper);
    font-size: 18px;
  }
  .scanner-bottom{
    padding: 18px 20px 28px;
    background: #0a0907;
    text-align:center;
  }
  .scanner-hint{
    font-size: 13px;
    color: var(--paper-dim);
    margin-bottom: 4px;
  }
  .scanner-manual{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--amber-bright);
    text-decoration: underline;
    margin-top: 10px;
    display:inline-block;
  }
  .scan-feedback{
    position:absolute;
    inset:0;
    background: var(--good);
    opacity:0;
    pointer-events:none;
  }
  .scan-feedback.flash{
    animation: flashgood .35s ease-out;
  }
  @keyframes flashgood{
    0%{ opacity:0.55; }
    100%{ opacity:0; }
  }

  /* ---------- modal sheet ---------- */
  .sheet-backdrop{
    position:fixed;
    inset:0;
    background: #000000a0;
    z-index:90;
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }
  .sheet{
    width:100%;
    max-width: 560px;
    max-height: 88vh;
    overflow-y:auto;
    background: var(--bg-raised);
    border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--hairline);
    padding: 10px 22px 28px;
    animation: sheetup .22s ease-out;
  }
  @keyframes sheetup{
    from{ transform: translateY(100%); }
    to{ transform: translateY(0); }
  }
  .sheet-handle{
    width:36px; height:4px;
    background: var(--groove);
    border-radius:3px;
    margin: 8px auto 14px;
  }
  .sheet-title{
    font-family: var(--font-display);
    font-size: 21px;
    font-weight:600;
    color: var(--paper);
    margin-bottom: 2px;
  }
  .sheet-sub{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing:0.05em;
    margin-bottom: 18px;
  }
  .field{
    margin-bottom: 14px;
  }
  .field label{
    display:block;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform:uppercase;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }
  .field input, .field select, .field textarea{
    width:100%;
    background: var(--bg-card);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--ink);
    font-size: 15px;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none;
    border-color: var(--amber);
  }
  .field-row{
    display:flex;
    gap: 10px;
  }
  .field-row .field{ flex:1; }

  .btn{
    width:100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    text-align:center;
    margin-top: 6px;
  }
  .btn-primary{
    background: linear-gradient(180deg, var(--amber-bright), var(--amber));
    color: #1a1306;
  }
  .btn-primary:active{ filter: brightness(0.92); }
  .btn-secondary{
    background: var(--bg-card);
    color: var(--paper-dim);
    border: 1px solid var(--hairline);
  }
  .btn-danger{
    background: transparent;
    color: var(--rust);
    font-size: 13px;
    padding: 10px;
  }
  .btn-row{
    display:flex;
    gap: 10px;
    margin-top: 14px;
  }
  .btn-row .btn{ margin-top:0; }

  .barcode-chip{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--amber-bright);
    background: #0000003a;
    border: 1px dashed var(--amber);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 16px;
    display:flex;
    align-items:center;
    gap: 8px;
  }

  /* ---------- detail card sheet ---------- */
  .detail-disc{
    width: 64px; height:64px;
    border-radius:50%;
    margin: 0 auto 14px;
    background:
      radial-gradient(circle at center, var(--paper) 0 6px, #0c0b08 6.5px 8px, var(--groove) 9px 25px, #0c0b08 25.5px 27px, var(--groove) 27.5px 32px);
    box-shadow: inset 0 0 0 1px #00000080, 0 4px 14px #00000055;
  }
  .detail-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 16px;
    margin: 16px 0;
    padding: 14px;
    background: var(--bg-card);
    border-radius: 12px;
  }
  .detail-grid .dt{
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: var(--ink-dim);
  }
  .detail-grid .dd{
    font-size: 14px;
    color: var(--paper);
    margin-top:2px;
  }

  .qty-stepper{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 22px;
    margin: 18px 0;
  }
  .qty-btn{
    width: 42px; height:42px;
    border-radius:50%;
    background: var(--bg-card);
    border: 1px solid var(--hairline);
    font-size: 20px;
    color: var(--paper);
    display:flex; align-items:center; justify-content:center;
  }
  .qty-value{
    font-family: var(--font-mono);
    font-size: 28px;
    color: var(--amber-bright);
    min-width: 50px;
    text-align:center;
  }

  .wh-qty-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 9px 0;
    border-bottom: 1px solid var(--hairline);
  }
  .wh-qty-row:last-child{ border-bottom:none; }
  .wh-qty-name{
    font-size: 13px;
    color: var(--paper-dim);
  }
  .qty-stepper-sm{
    gap: 12px;
    margin: 0;
  }
  .qty-btn-sm{
    width: 30px; height:30px;
    font-size: 16px;
  }
  .qty-value-sm{
    font-size: 17px;
    min-width: 28px;
  }

  /* ---------- inventory mode ---------- */
  .inv-banner{
    background: linear-gradient(135deg, #2a1f10, #1d1a14);
    border: 1px solid var(--amber);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 18px;
  }
  .inv-banner .it{
    font-family: var(--font-display);
    font-size: 17px;
    color: var(--amber-bright);
    margin-bottom: 4px;
  }
  .inv-banner .id{
    font-size: 12px;
    color: var(--paper-dim);
    line-height:1.5;
  }
  .inv-stats{
    display:flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  .inv-stat{
    flex:1;
    background: var(--bg-card);
    border-radius: 12px;
    padding: 14px 10px;
    text-align:center;
  }
  .inv-stat .n{
    font-family: var(--font-mono);
    font-size: 24px;
    color: var(--paper);
  }
  .inv-stat.scanned .n{ color: var(--good); }
  .inv-stat.unexpected .n{ color: var(--rust); }
  .inv-stat .l{
    font-size: 9px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: var(--ink-dim);
    margin-top: 4px;
  }
  .inv-feed-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--hairline);
    font-size: 13px;
  }
  .inv-feed-item .tag{
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 3px 7px;
    border-radius: 5px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    flex-shrink:0;
  }
  .tag-new{ background:#4a7a3a33; color: var(--good); }
  .tag-dup{ background:#8d847233; color: var(--ink-dim); }
  .tag-unknown{ background:#b6502f33; color: var(--rust); }
  .inv-feed-name{ flex:1; color: var(--paper); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .start-inv-card{
    text-align:center;
    padding: 40px 24px;
  }
  .start-inv-card .vinyl-spin{
    width: 90px; height:90px;
    margin: 0 auto 22px;
    border-radius:50%;
    background:
      radial-gradient(circle at center, var(--amber) 0 8px, #0c0b08 8.5px 10px, var(--groove) 11px 30px, #0c0b08 30.5px 32px, var(--groove) 32.5px 38px);
    box-shadow: 0 8px 24px #00000066;
  }
  .start-inv-card h2{
    font-family: var(--font-display);
    font-size: 21px;
    color: var(--paper);
    margin-bottom: 8px;
  }
  .start-inv-card p{
    font-size: 13px;
    color: var(--ink-dim);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .report-section{
    margin-bottom: 22px;
  }
  .report-title{
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color: var(--ink-dim);
    margin-bottom: 10px;
  }
  .report-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 10px 12px;
    background: var(--bg-card);
    border-radius: 10px;
    margin-bottom:6px;
  }
  .report-row .rn{ font-size:14px; color: var(--paper); }
  .report-row .rm{ font-family: var(--font-mono); font-size: 11px; color: var(--ink-dim); }

  .toast{
    position:fixed;
    bottom: 100px;
    left:50%;
    transform: translateX(-50%);
    background: var(--bg-raised);
    border: 1px solid var(--amber);
    color: var(--paper);
    padding: 11px 20px;
    border-radius: 30px;
    font-size: 13px;
    z-index: 200;
    box-shadow: 0 6px 20px #00000077;
    opacity:0;
    transition: opacity .2s, transform .2s;
    pointer-events:none;
    white-space:nowrap;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(-4px); }

  ::-webkit-scrollbar{ width:0; height:0; }

  /* ---------- import flow ---------- */
  .import-dropzone{
    border: 1.5px dashed var(--amber);
    border-radius: 14px;
    padding: 28px 16px;
    text-align:center;
    cursor:pointer;
    background: #00000020;
    margin-bottom: 16px;
    transition: background .15s;
  }
  .import-dropzone:active{ background: #00000040; }
  .import-dropzone .ic{ font-size:28px; margin-bottom:8px; color: var(--amber-bright); }
  .import-dropzone .tt{
    font-family: var(--font-display);
    font-size: 16px;
    color: var(--paper);
    margin-bottom: 4px;
  }
  .import-dropzone .dd{
    font-size: 12px;
    color: var(--ink-dim);
  }
  .import-step-label{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing:0.1em;

    if(record.qty === null || record.qty === undefined){
      record.qty = emptyQtyMap();
      return record;

    if(typeof record.qty === 'number'){
      const legacy = record.qty;
      record.qty = emptyQtyMap();
      record.qty['Lemonade bar'] = legacy;
      return record;
    }
    // already an object - make sure all warehouses present
    WAREHOUSES.forEach(w=>{
      if(typeof record.qty[w] !== 'number') record.qty[w] = 0;

  /* ====================== IMPORT FROM EXCEL/CSV ====================== */
  const importFileInput = document.getElementById('import-file-input');
  let importState = null; // {rows: [...raw arrays...], headerRowIdx, mapping: {dist,cat,artist,title,style,price,barcode}, distFilter, splitArtist}

  document.getElementById('open-import-btn').addEventListener('click', openImportStart);

  function openImportStart(){
    openSheet(`
      <div class="sheet-handle"></div>
      <div class="sheet-title">Импорт из файла</div>
      <div class="sheet-sub">Загрузите таблицу Excel (.xlsx) или CSV со списком пластинок</div>

      <div class="import-dropzone" id="import-dropzone">

      </div>

        исполнитель, альбом, цена и так далее.
      </div>
    `);
    document.getElementById('import-dropzone').addEventListener('click', ()=> importFileInput.click());

  importFileInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (evt)=>{
      try{
        let rows;
        if(file.name.toLowerCase().endsWith('.csv')){
          const wb = XLSX.read(evt.target.result, {type:'string'});
          rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, defval:''});
        } else {
          const wb = XLSX.read(evt.target.result, {type:'array'});
          rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, defval:''});
        }
        rows = rows.filter(r => r.some(c => String(c).trim() !== ''));
        if(rows.length === 0){
          toast('Файл пуст или не удалось прочитать данные');
          return;
        }
        importState = { rows, mapping: {}, distFilter: '', splitArtist: true };
        openImportMapping();
      }catch(err){
        toast('Не удалось прочитать файл');
      }
    };
    if(file.name.toLowerCase().endsWith('.csv')){
      reader.readAsText(file, 'utf-8');
    } else {
      reader.readAsArrayBuffer(file);
    }
    importFileInput.value = '';
  });

  function guessColumnIndex(headerRow, keywords){
    for(let i=0;i<headerRow.length;i++){
      const h = String(headerRow[i]).toLowerCase();
      if(keywords.some(k => h.includes(k))) return i;
    }
    return -1;
  }

  function openImportMapping(){
    const rows = importState.rows;
    // find the most likely header row: first row with >=2 non-empty text cells, scanning first 5 rows
    let headerRowIdx = 0;
    for(let i=0;i<Math.min(5, rows.length);i++){
      const nonEmpty = rows[i].filter(c => String(c).trim() !== '').length;
      if(nonEmpty >= 2){ headerRowIdx = i; break; }
    }
    importState.headerRowIdx = headerRowIdx;
    const headerRow = rows[headerRowIdx];
    const colCount = Math.max(...rows.map(r=>r.length));

    const distGuess = guessColumnIndex(headerRow, ['дистр','distrib','label code','lbl']);
    const catGuess = guessColumnIndex(headerRow, ['cat', 'кат']);
    const nameGuess = guessColumnIndex(headerRow, ['release', 'релиз', 'название', 'name', 'title']);
    const styleGuess = guessColumnIndex(headerRow, ['style', 'жанр', 'стил']);
    const priceGuess = guessColumnIndex(headerRow, ['округ', 'цена в магазин', 'retail', 'price']);

    importState.mapping = {
      dist: distGuess, cat: catGuess, name: nameGuess, style: styleGuess, price: priceGuess
    };

    const colOptions = (selected)=>{
      let opts = `<option value="-1" ${selected===-1?'selected':''}>— не использовать —</option>`;
      for(let i=0;i<colCount;i++){
        const sample = String(headerRow[i] !== undefined ? headerRow[i] : '').trim();
        const label = sample ? `${colLetter(i)}: ${sample.slice(0,28)}` : colLetter(i);
        opts += `<option value="${i}" ${i===selected?'selected':''}>${escapeHtml(label)}</option>`;
      }
      return opts;
    };

    openSheet(`
      <div class="sheet-handle"></div>
      <div class="sheet-title">Сопоставление столбцов</div>
      <div class="sheet-sub">Найдено строк: ${rows.length - headerRowIdx - 1}. Проверьте соответствие столбцов.</div>

      <div class="map-row">
        <label>Дистрибьютор</label>
        <select id="map-dist">${colOptions(distGuess)}</select>
      </div>
      <div class="map-row">
        <label>Каталожный №</label>
        <select id="map-cat">${colOptions(catGuess)}</select>
      </div>
      <div class="map-row">
        <label>Release name</label>
        <select id="map-name">${colOptions(nameGuess)}</select>
      </div>
      <div class="map-row">
        <label>Стиль</label>
        <select id="map-style">${colOptions(styleGuess)}</select>
      </div>
      <div class="map-row">
        <label>Цена в магазине</label>
        <select id="map-price">${colOptions(priceGuess)}</select>
      </div>

      <div class="field">
        <label>Фильтр по дистрибьютору (необязательно)</label>
        <input type="text" id="dist-filter" placeholder="Например, MC — оставить только эти строки" />
      </div>

      <div class="field">
        <label>На какой склад относится этот файл</label>
        <select id="import-warehouse">
          ${WAREHOUSES.map(w => `<option value="${escapeHtml(w)}">${escapeHtml(w)}</option>`).join('')}
        </select>
      </div>

      <div class="barcode-scheme-box">
        <div class="lbl">Схема штрих-кода</div>
        <div style="font-size:12px;color:var(--paper-dim)">Дистрибьютор + пробел + Каталожный №</div>
        <div class="scheme-preview" id="scheme-preview">пример: MC NRP002</div>
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" id="map-cancel">Отмена</button>
        <button class="btn btn-primary" id="map-continue">Далее: проверка</button>
      </div>
    `);

    document.getElementById('map-cancel').onclick = closeSheet;
    document.getElementById('map-continue').onclick = ()=>{
      importState.mapping = {
        dist: parseInt(document.getElementById('map-dist').value,10),
        cat: parseInt(document.getElementById('map-cat').value,10),
        name: parseInt(document.getElementById('map-name').value,10),
        style: parseInt(document.getElementById('map-style').value,10),
        price: parseInt(document.getElementById('map-price').value,10)
      };
      importState.distFilter = document.getElementById('dist-filter').value.trim();
      importState.targetWarehouse = document.getElementById('import-warehouse').value;
      if(importState.mapping.name === -1){
        toast('Укажите столбец «Release name»');
        return;
      }
      openImportPreview();
    };
  }

  function colLetter(i){
    let s = '';
    i++;
    while(i>0){
      const m = (i-1)%26;
      s = String.fromCharCode(65+m) + s;
      i = Math.floor((i-1)/26);
    }
    return s;
  }

  function parseImportRows(){
    const { rows, headerRowIdx, mapping, distFilter } = importState;
    const out = [];
    for(let i=headerRowIdx+1; i<rows.length; i++){
      const row = rows[i];
      const get = (idx)=> idx>=0 && idx<row.length ? String(row[idx]).trim() : '';
      const dist = get(mapping.dist);
      const cat = get(mapping.cat);
      const name = get(mapping.name);
      const style = get(mapping.style);
      const priceRaw = get(mapping.price);

      if(!name) continue; // skip empty/separator rows
      if(distFilter && dist.toUpperCase() !== distFilter.toUpperCase()) continue;

      // "artist" field now holds the full Release name as-is; "title" field holds Style.
      const artist = name;
      const title = style;

      const priceNum = parseFloat(priceRaw.replace(',', '.'));
      const price = isNaN(priceNum) ? '' : priceNum;

      let barcode = '';
      if(dist && cat){
        barcode = (dist.toUpperCase().replace(/\s+/g,'') + ' ' + cat.toUpperCase().replace(/\s+/g,''));
      } else if(cat){
        barcode = cat.toUpperCase().replace(/\s+/g,'');
      }

      out.push({
        barcode, artist, title,
        style: style || '',
        price: price,
        dist, cat
      });
    }
    return out;
  }

  function openImportPreview(){
    const parsed = parseImportRows();
    if(parsed.length === 0){
      openSheet(`
        <div class="sheet-handle"></div>
        <div class="sheet-title">Ничего не найдено</div>
        <div class="sheet-sub">По заданным столбцам и фильтру не нашлось ни одной строки. Проверьте сопоставление.</div>
        <div class="btn-row">
          <button class="btn btn-secondary" id="back-to-map">Назад</button>
        </div>
      `);
      document.getElementById('back-to-map').onclick = openImportMapping;
      return;
    }

    const existingBarcodes = new Set(catalog.map(r=>r.barcode).filter(Boolean));
    const newCount = parsed.filter(p => !p.barcode || !existingBarcodes.has(p.barcode)).length;
    const dupCount = parsed.length - newCount;

    const previewRows = parsed.slice(0, 8).map(p => `
      <tr>
        <td>${escapeHtml(p.artist || '—')}</td>
        <td>${escapeHtml(p.title || '—')}</td>
        <td>${p.price !== '' ? p.price : '—'}</td>
        <td>${escapeHtml(p.barcode || '—')}</td>
      </tr>`).join('');

    importState.parsed = parsed;
    importState.skipDuplicates = true;

    openSheet(`
      <div class="sheet-handle"></div>
      <div class="sheet-title">Проверка перед импортом</div>
      <div class="sheet-sub">Показаны первые ${Math.min(8, parsed.length)} из ${parsed.length} строк</div>

      <div style="overflow-x:auto">
        <table class="import-preview-table">
          <thead><tr><th>Release name</th><th>Стиль</th><th>Цена</th><th>Штрих-код</th></tr></thead>
          <tbody>${previewRows}</tbody>
        </table>
      </div>

      <div class="import-summary-box">
        <div class="import-summary-stat new"><div class="n">${newCount}</div><div class="l">Новых</div></div>
        <div class="import-summary-stat dup"><div class="n">${dupCount}</div><div class="l">Совпадают по коду</div></div>
      </div>

      ${dupCount > 0 ? `
      <div class="import-step-label">Что делать с совпадениями</div>
      <div class="radio-row">
        <div class="radio-opt selected" id="opt-skip">Пропустить</div>
        <div class="radio-opt" id="opt-update">Обновить данные</div>
      </div>
      ` : ''}

      <div class="btn-row">
        <button class="btn btn-secondary" id="back-to-map-2">Назад</button>
        <button class="btn btn-primary" id="confirm-import-btn">Импортировать ${parsed.length} ${parsed.length===1?'позицию':'позиций'}</button>
      </div>
    `);

    document.getElementById('back-to-map-2').onclick = openImportMapping;

    const optSkip = document.getElementById('opt-skip');
    const optUpdate = document.getElementById('opt-update');
    if(optSkip && optUpdate){
      optSkip.onclick = ()=>{ importState.skipDuplicates = true; optSkip.classList.add('selected'); optUpdate.classList.remove('selected'); };
      optUpdate.onclick = ()=>{ importState.skipDuplicates = false; optUpdate.classList.add('selected'); optSkip.classList.remove('selected'); };
    }

    document.getElementById('confirm-import-btn').onclick = runImport;
  }

  function runImport(){
    const { parsed, skipDuplicates } = importState;
    let added = 0, updated = 0, skipped = 0;

    parsed.forEach(p=>{
      const existing = p.barcode ? catalog.find(r => r.barcode === p.barcode) : null;
      if(existing){
        if(skipDuplicates){
          skipped++;
          return;
        }
        normalizeQty(existing);
        existing.artist = p.artist || existing.artist;
        existing.title = p.title || existing.title;
        if(p.price !== '') existing.priceNote = p.price;
        if(importState.targetWarehouse && !existing.qty[importState.targetWarehouse]){
          existing.qty[importState.targetWarehouse] = 1;
        }
        updated++;
      } else {
        catalog.push({
          id: uid(),
          barcode: p.barcode,
          artist: p.artist,
          title: p.title,
          label: p.dist || '',
          qty: makeImportQty(importState.targetWarehouse, p.price !== '' ? 1 : 1),
          notes: '',
          priceNote: p.price !== '' ? p.price : '',
          addedAt: Date.now()
        });
        added++;
      }
    });

    saveCatalog(catalog);
    updateHeaderCount();
    renderCatalogList();
    closeSheet();
    toast(`Импорт завершён: +${added}${updated?`, обновлено ${updated}`:''}${skipped?`, пропущено ${skipped}`:''}`);
    importState = null;
  }

  /* ====================== SCANNER ====================== */
  const scannerOverlay = document.getElementById('scanner-overlay');
  const scannerVideo = document.getElementById('scanner-video');
  const scannerModeBadge = document.getElementById('scanner-mode-badge');
  const scannerHint = document.getElementById('scanner-hint');
  const scanFeedback = document.getElementById('scan-feedback');

  let zxingReader = null;
  let mediaStream = null;
  let scannerMode = 'catalog'; // 'catalog' | 'inventory'
  let scanLock = false; // prevent double-fires

  function flashFeedback(){
    scanFeedback.classList.remove('flash');
    void scanFeedback.offsetWidth;
    scanFeedback.classList.add('flash');
  }

  async function openScanner(mode){
    scannerMode = mode;
    scannerModeBadge.textContent = mode === 'catalog' ? 'Каталог' : 'Инвентаризация';
    scannerHint.textContent = 'Наведите камеру на штрих-код пластинки';
    scannerOverlay.classList.remove('hidden');
    scanLock = false;

    try{
      mediaStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
      scannerVideo.srcObject = mediaStream;
      await scannerVideo.play();

      if(!zxingReader){
        zxingReader = new ZXing.BrowserMultiFormatReader();
      }
      zxingReader.decodeFromVideoElement(scannerVideo, (result, err)=>{
        if(result && !scanLock){
          scanLock = true;
          flashFeedback();
          handleScanResult(result.getText());
          setTimeout(()=>{ scanLock = false; }, 1400);
        }
      });
    }catch(e){
      scannerHint.textContent = 'Нет доступа к камере. Проверьте разрешения или введите код вручную.';
    }
  }

  function closeScanner(){
    scannerOverlay.classList.add('hidden');
    if(zxingReader){
      try{ zxingReader.reset(); }catch(e){}
    }
    if(mediaStream){
      mediaStream.getTracks().forEach(t=>t.stop());
      mediaStream = null;
    }
  }

  document.getElementById('scanner-close').addEventListener('click', closeScanner);
  document.getElementById('scanner-manual-btn').addEventListener('click', ()=>{
    closeScanner();
    openManualBarcodeEntry();
  });

  document.getElementById('fab-scan').addEventListener('click', ()=>{
    openScanner(currentTab === 'inventory' ? 'inventory' : 'catalog');
  });

  function openManualBarcodeEntry(){
    openSheet(`
      <div class="sheet-handle"></div>
      <div class="sheet-title">Ввести код вручную</div>
      <div class="sheet-sub">Если камера недоступна или код повреждён</div>
      <div class="field">
        <label>Штрих-код</label>
        <input type="text" inputmode="numeric" id="manual-barcode" placeholder="Например, 4607032870016" autofocus />
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="manual-cancel">Отмена</button>
        <button class="btn btn-primary" id="manual-submit">Найти</button>
      </div>
    `);
    document.getElementById('manual-cancel').onclick = closeSheet;
    document.getElementById('manual-submit').onclick = ()=>{
      const code = document.getElementById('manual-barcode').value.trim();
      if(!code){ toast('Введите код'); return; }
      closeSheet();
      handleScanResult(code, true);
    };
  }

  function handleScanResult(barcode, fromManual){
    if(scannerMode === 'catalog'){
      closeScanner();
      const existing = catalog.find(r => r.barcode === barcode);
      if(existing){
        openRecordDetail(existing.id);
        toast('Найдено в каталоге');
      } else {
        openRecordForm(null, barcode);
      }
    } else {
      handleInventoryScan(barcode, fromManual);
    }
  }

  /* ====================== INVENTORY MODE ====================== */
  function ensureInvSession(){
    if(!invSession){
      invSession = {
        warehouse: null,      // selected before session truly starts
        startedAt: Date.now(),
        scannedIds: [],       // record ids found at least once
        scannedLog: [],       // {ts, barcode, status, recordId, name}
        unknownBarcodes: []   // {barcode, ts}
      };
      saveInvSession(invSession);
    }
  }

  function handleInventoryScan(barcode, fromManual){
    if(!invSession || !invSession.warehouse) return;
    const record = catalog.find(r => r.barcode === barcode);

    if(!record){
      invSession.unknownBarcodes.push({barcode, ts: Date.now()});
      invSession.scannedLog.unshift({ts: Date.now(), barcode, status:'unknown', recordId:null, name: barcode});
      saveInvSession(invSession);
      if(fromManual){ closeSheetIfOpen(); }
      toast('Штрих-код не найден в каталоге');
      renderInventoryView();
      return;
    }

    normalizeQty(record);
    const alreadyScanned = invSession.scannedIds.includes(record.id);
    const expectedHere = (record.qty[invSession.warehouse] || 0) > 0;

    if(!alreadyScanned){
      invSession.scannedIds.push(record.id);
      const status = expectedHere ? 'new' : 'unexpected';
      invSession.scannedLog.unshift({ts: Date.now(), barcode, status, recordId: record.id, name: `${record.artist} — ${record.title}`});
      toast(expectedHere ? `✓ ${record.artist || record.title}` : `⚠ Не ожидалось на этом складе: ${record.artist || record.title}`);
    } else {
      invSession.scannedLog.unshift({ts: Date.now(), barcode, status:'dup', recordId: record.id, name: `${record.artist} — ${record.title}`});
      toast(`Уже отсканировано: ${record.artist || record.title}`);
    }
    saveInvSession(invSession);
    if(fromManual) closeSheetIfOpen();
    renderInventoryView();
  }

  function closeSheetIfOpen(){
    if(!sheetBackdrop.classList.contains('hidden')) closeSheet();
  }

  function openWarehousePicker(){
    openSheet(`
      <div class="sheet-handle"></div>
      <div class="sheet-title">Выберите склад</div>
      <div class="sheet-sub">Инвентаризация проводится отдельно для каждого склада</div>
      ${WAREHOUSES.map(w => `<button class="btn btn-secondary wh-pick-btn" data-wh="${escapeHtml(w)}" style="margin-bottom:8px">${escapeHtml(w)}</button>`).join('')}
      <button class="btn btn-secondary" id="wh-pick-cancel" style="margin-top:6px">Отмена</button>
    `);
    sheetContent.querySelectorAll('.wh-pick-btn').forEach(btn=>{
      btn.onclick = ()=>{
        ensureInvSession();
        invSession.warehouse = btn.dataset.wh;
        saveInvSession(invSession);
        closeSheet();
        renderInventoryView();
      };
    });
    document.getElementById('wh-pick-cancel').onclick = closeSheet;
  }

  function renderInventoryView(){
    if(!invSession || !invSession.warehouse){
      viewInventory.innerHTML = `
        <div class="start-inv-card">
          <div class="vinyl-spin"></div>
          <h2>Начать инвентаризацию</h2>
          <p>Выберите склад, затем сканируйте пластинки подряд.<br>
          В конце увидите отчёт: что нашли, что отсутствует на этом складе,<br>
          и что отсканировано там, где не ожидалось.</p>
          <button class="btn btn-primary" id="start-inv-btn">Выбрать склад и начать</button>
        </div>
      `;
      document.getElementById('start-inv-btn').onclick = openWarehousePicker;
      return;
    }

    const warehouse = invSession.warehouse;
    const expectedRecords = catalog.filter(r => (normalizeQty(r).qty[warehouse]||0) > 0);
    const totalPositions = expectedRecords.length;
    const scannedExpectedCount = expectedRecords.filter(r => invSession.scannedIds.includes(r.id)).length;
    const missingCount = totalPositions - scannedExpectedCount;
    const unknownCount = invSession.unknownBarcodes.length;
    const unexpectedCount = invSession.scannedLog.filter(e => e.status === 'unexpected').length;

    const feedHtml = invSession.scannedLog.slice(0,30).map(entry=>{
      const tagClass = entry.status==='new' ? 'tag-new' : entry.status==='dup' ? 'tag-dup' : entry.status==='unexpected' ? 'tag-unexpected' : 'tag-unknown';
      const tagText = entry.status==='new' ? 'Найдено' : entry.status==='dup' ? 'Повтор' : entry.status==='unexpected' ? 'Не ожидалось' : 'Неизвестно';
      const time = new Date(entry.ts).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
      return `<div class="inv-feed-item">
        <span class="tag ${tagClass}">${tagText}</span>
        <span class="inv-feed-name">${escapeHtml(entry.name)}</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-dim)">${time}</span>
      </div>`;
    }).join('');

    viewInventory.innerHTML = `
      <div class="inv-banner">
        <div class="it">Инвентаризация: ${escapeHtml(warehouse)}</div>
        <div class="id">Начата ${new Date(invSession.startedAt).toLocaleString('ru-RU')}<br>
        Сканируйте пластинки кнопкой ниже — статус обновляется сразу.</div>
      </div>

      <div class="inv-stats">
        <div class="inv-stat scanned">
          <div class="n">${scannedExpectedCount}/${totalPositions}</div>
          <div class="l">Найдено</div>
        </div>
        <div class="inv-stat">
          <div class="n">${missingCount}</div>
          <div class="l">Не найдено</div>
        </div>
        <div class="inv-stat unexpected">
          <div class="n">${unexpectedCount + unknownCount}</div>
          <div class="l">Странности</div>
        </div>
      </div>

      <div class="btn-row" style="margin-bottom:18px">
        <button class="btn btn-secondary" id="switch-wh-btn">Сменить склад</button>
        <button class="btn btn-secondary" id="finish-inv-btn">Отчёт</button>
      </div>

      <div class="section-label">Лента сканирования</div>
      <div id="inv-feed">
        ${feedHtml || '<div class="empty-state" style="padding:30px 10px"><div class="desc">Пока ничего не отсканировано</div></div>'}
      </div>
    `;

    document.getElementById('finish-inv-btn').onclick = showInventoryReport;
    document.getElementById('switch-wh-btn').onclick = ()=>{
      invSession = null;
      saveInvSession(null);
      openWarehousePicker();
    };
  }

  function showInventoryReport(){
    const warehouse = invSession.warehouse;
    const expectedRecords = catalog.filter(r => (normalizeQty(r).qty[warehouse]||0) > 0);
    const totalPositions = expectedRecords.length;
    const scannedExpectedCount = expectedRecords.filter(r => invSession.scannedIds.includes(r.id)).length;
    const missingRecords = expectedRecords.filter(r => !invSession.scannedIds.includes(r.id));
    const unexpectedIds = [...new Set(invSession.scannedLog.filter(e=>e.status==='unexpected').map(e=>e.recordId))];
    const unexpectedRecords = unexpectedIds.map(id => catalog.find(r=>r.id===id)).filter(Boolean);
    const unknownList = invSession.unknownBarcodes;

    const missingHtml = missingRecords.length
      ? missingRecords.map(r=>`
        <div class="report-row">
          <div class="rn">${escapeHtml(r.artist||'—')} — ${escapeHtml(r.title||'—')}</div>
          <div class="rm">ожидалось: ${r.qty[warehouse]} шт.</div>
        </div>`).join('')
      : `<div class="report-row"><div class="rn" style="color:var(--good)">Все позиции найдены ✓</div></div>`;

    const unexpectedHtml = unexpectedRecords.length
      ? unexpectedRecords.map(r=>`
        <div class="report-row">
          <div class="rn">${escapeHtml(r.artist||'—')} — ${escapeHtml(r.title||'—')}</div>
          <div class="rm">не должно быть здесь</div>
        </div>`).join('')
      : `<div class="report-row"><div class="rn" style="color:var(--ink-dim)">Нет</div></div>`;

    const unknownHtml = unknownList.length
      ? unknownList.map(u=>`
        <div class="report-row">
          <div class="rn">${escapeHtml(u.barcode)}</div>
          <div class="rm">не в каталоге</div>
        </div>`).join('')
      : `<div class="report-row"><div class="rn" style="color:var(--ink-dim)">Нет</div></div>`;

    openSheet(`
      <div class="sheet-handle"></div>
      <div class="sheet-title">Отчёт: ${escapeHtml(warehouse)}</div>
      <div class="sheet-sub">${new Date(invSession.startedAt).toLocaleDateString('ru-RU')} — ${new Date().toLocaleDateString('ru-RU')}</div>

      <div class="inv-stats">
        <div class="inv-stat scanned"><div class="n">${scannedExpectedCount}/${totalPositions}</div><div class="l">Найдено позиций</div></div>
        <div class="inv-stat unexpected"><div class="n">${unexpectedRecords.length + unknownList.length}</div><div class="l">Странностей</div></div>
      </div>

      <div class="report-section">
        <div class="report-title">Не найдено на складе (${missingRecords.length})</div>
        ${missingHtml}
      </div>

      <div class="report-section">
        <div class="report-title">Найдено, но не ожидалось здесь (${unexpectedRecords.length})</div>
        ${unexpectedHtml}
      </div>

      <div class="report-section">
        <div class="report-title">Отсканировано, но нет в каталоге (${unknownList.length})</div>
        ${unknownHtml}
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" id="continue-inv-btn">Продолжить сессию</button>
        <button class="btn btn-primary" id="finish-session-btn">Завершить сессию</button>
      </div>
    `);

    document.getElementById('continue-inv-btn').onclick = closeSheet;
    document.getElementById('finish-session-btn').onclick = ()=>{
      invSession = null;
      saveInvSession(null);
      closeSheet();
      renderInventoryView();
      toast('Сессия инвентаризации завершена');
    };
  }

  /* ====================== INIT ====================== */
  function maybeSeedMcCatalog(){
    const alreadySeeded = localStorage.getItem(SEED_FLAG_KEY);
    if(alreadySeeded) return;
    if(catalog.length === 0){
      const existingBarcodes = new Set(catalog.map(r=>r.barcode));
      MC_SEED_DATA.forEach(item=>{
        if(item.barcode && existingBarcodes.has(item.barcode)) return;
        catalog.push({
          id: uid(),
          barcode: item.barcode,
          artist: item.artist || '',
          title: item.title || '',
          year: '',
          label: item.label || 'MC',
          condition: '',
          qty: { 'Lemonade bar': 1, 'WaxBrew Textura': 0, 'WaxBrew TreCanne': 0 },
          notes: item.notes || '',
          priceNote: item.priceNote !== undefined ? item.priceNote : '',
          addedAt: Date.now()
        });
      });
      saveCatalog(catalog);
      toast(`Загружен стартовый каталог MC: ${MC_SEED_DATA.length} позиций`);
    }
    localStorage.setItem(SEED_FLAG_KEY, '1');
  }

  catalog.forEach(normalizeQty);
  saveCatalog(catalog);
  maybeSeedMcCatalog();
  updateHeaderCount();
  renderWarehouseFilter();
  renderCatalogList();

})();
</script>
</body>
</html>
