<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>КРУГ — каталог пластинок</title>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Scanner & utilities -->
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

  :root{
    --bg: #15130f;
    --bg-raised: #1d1a14;
    --bg-card: #211e17;
    --groove: #2a261d;
    --paper: #ece4d3;
    --paper-dim: #b9ad95;
    --ink: #ece4d3;
    --ink-dim: #8d8472;
    --amber: #d98c2b;
    --amber-bright: #f0a93e;
    --rust: #b6502f;
    --good: #6f9456;
    --line: #34302434;
    --hairline: #ffffff14;
    --font-display: 'Spectral', Georgia, 'Times New Roman', serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --font-body: 'Inter', -apple-system, sans-serif;
  }

  @font-face {
    font-family: 'Spectral';
    src: local('Georgia');
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html, body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }

  body{
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    background-image:
      radial-gradient(circle at 50% -10%, #2c2719 0%, transparent 60%);
  }

  button{ font-family: inherit; border:none; background:none; color:inherit; cursor:pointer; }
  input, select, textarea{ font-family: inherit; }

  /* ---------- header ---------- */
  .topbar{
    position: sticky;
    top:0;
    z-index:20;
    padding: 18px 20px 14px;
    background: linear-gradient(180deg, var(--bg) 70%, transparent);
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .brand .mark{
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--paper);
  }
  .brand .mark .ring{
    color: var(--amber);
  }
  .brand .sub{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .count-pill{
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--ink-dim);
    text-align:right;
    line-height:1.5;
  }
  .count-pill b{
    color: var(--paper);
    font-size:13px;
  }

  /* ---------- tab nav ---------- */
  .tabs{
    display:flex;
    gap: 4px;
    padding: 0 20px;
    margin-top: 4px;
  }
  .tab{
    flex:1;
    padding: 10px 0;
    text-align:center;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-dim);
    border-bottom: 2px solid var(--groove);
    transition: color .15s, border-color .15s;
  }
  .tab.active{
    color: var(--amber-bright);
    border-color: var(--amber);
  }

  main{
    flex:1;
    padding: 18px 20px 100px;
    max-width: 560px;
    width:100%;
    margin: 0 auto;
  }

  .hidden{ display:none !important; }

  /* ---------- scan button (FAB) ---------- */
  .fab-wrap{
    position: fixed;
    bottom: 22px;
    left:0; right:0;
    display:flex;
    justify-content:center;
    z-index: 30;
    pointer-events:none;
  }
  .fab{
    pointer-events:auto;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--amber-bright), var(--amber) 55%, #8a5c1d 100%);
    box-shadow: 0 8px 24px #00000066, 0 0 0 6px var(--bg), 0 0 0 7px var(--groove);
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform .12s;
  }
  .fab:active{ transform: scale(0.92); }
  .fab svg{ width:26px; height:26px; }

  /* ---------- catalog list ---------- */
  .section-label{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin: 22px 0 10px;
    display:flex;
    align-items:center;
    gap: 10px;
  }
  .section-label::after{
    content:'';
    flex:1;
    height:1px;
    background: var(--hairline);
  }
  .section-label:first-child{ margin-top:0; }

  .search-row{
    display:flex;
    gap:8px;
    margin-bottom: 4px;
  }
  .search-input{
    flex:1;
    background: var(--bg-raised);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--ink);
    font-size: 14px;
  }
  .search-input::placeholder{ color: var(--ink-dim); }
  .search-input:focus{ outline:none; border-color: var(--amber); }

  .import-btn{
    width: 44px;
    height: 44px;
    flex-shrink:0;
    border-radius: 10px;
    background: var(--bg-raised);
    border: 1px solid var(--hairline);
    color: var(--ink-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    transition: border-color .15s, color .15s;
  }
  .import-btn svg{ width:18px; height:18px; }
  .import-btn:active{ border-color: var(--amber); color: var(--amber-bright); }

  .wh-filter-row{
    display:flex;
    gap: 7px;
    margin-bottom: 12px;
    overflow-x:auto;
    padding-bottom: 2px;
  }
  .wh-chip{
    flex-shrink:0;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.03em;
    padding: 8px 13px;
    border-radius: 20px;
    border: 1px solid var(--hairline);
    color: var(--ink-dim);
    background: var(--bg-raised);
    white-space:nowrap;
  }
  .wh-chip.active{
    border-color: var(--amber);
    color: var(--amber-bright);
    background: #d98c2b14;
  }

  .record-card{
    display:flex;
    gap: 14px;
    align-items:center;
    background: var(--bg-card);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor:pointer;
    transition: border-color .15s, transform .1s;
  }
  .record-card:active{ transform: scale(0.99); }
  .record-card.found{ border-color: #4a7a3a55; background: #1c2117; }
  .record-card.missing{ border-color: #b6502f55; }

  .disc-icon{
    width: 42px;
    height: 42px;
    border-radius: 50%;
    flex-shrink:0;
    background:
      radial-gradient(circle at center, var(--paper) 0 4px, #0c0b08 4.5px 5.5px, var(--groove) 6px 16px, #0c0b08 16.5px 17.5px, var(--groove) 18px 21px);
    box-shadow: inset 0 0 0 1px #00000080;
  }
  .record-info{ flex:1; min-width:0; }
  .record-artist{
    font-family: var(--font-display);
    font-size: 16px;
    font-weight:600;
    color: var(--paper);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .record-title{
    font-size: 13px;
    color: var(--ink-dim);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    margin-top:1px;
  }
  .record-meta{
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-dim);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .record-qty{
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--amber-bright);
    flex-shrink:0;
    text-align:right;
    line-height:1.3;
  }
  .record-qty .label{
    display:block;
    font-size: 8px;
    letter-spacing:0.1em;
    color: var(--ink-dim);
    text-transform:uppercase;
  }

  .empty-state{
    text-align:center;
    padding: 60px 20px;
    color: var(--ink-dim);
  }
  .empty-state .icon{ font-size:34px; margin-bottom:10px; opacity:0.6; }
  .empty-state .title{
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--paper-dim);
    margin-bottom:6px;
  }
  .empty-state .desc{ font-size: 13px; line-height:1.5; }

  /* ---------- scanner overlay ---------- */
  .scanner-overlay{
    position: fixed;
    inset:0;
    background: #000;
    z-index: 100;
    display:flex;
    flex-direction:column;
  }
  .scanner-video-wrap{
    position:relative;
    flex:1;
    overflow:hidden;
    background:#000;
  }
  #scanner-video{
    width:100%;
    height:100%;
    object-fit: cover;
  }
  .scan-frame{
    position:absolute;
    top:50%; left:50%;
    transform: translate(-50%,-50%);
    width: 70%;
    max-width: 280px;
    aspect-ratio: 1 / 1;
    pointer-events:none;
  }
  .scan-frame .corner{
    position:absolute;
    width: 26px; height:26px;
    border: 3px solid var(--amber-bright);
  }
  .scan-frame .tl{ top:0; left:0; border-right:none; border-bottom:none; border-top-left-radius:6px;}
  .scan-frame .tr{ top:0; right:0; border-left:none; border-bottom:none; border-top-right-radius:6px;}
  .scan-frame .bl{ bottom:0; left:0; border-right:none; border-top:none; border-bottom-left-radius:6px;}
  .scan-frame .br{ bottom:0; right:0; border-left:none; border-top:none; border-bottom-right-radius:6px;}
  .scan-line{
    position:absolute;
    left:4%; right:4%;
    top:50%;
    height:2px;
    background: var(--rust);
    box-shadow: 0 0 8px var(--amber-bright);
    animation: scanmove 1.8s ease-in-out infinite;
  }
  @keyframes scanmove{
    0%,100%{ top: 14%; }
    50%{ top: 86%; }
  }
  .scanner-top{
    position:absolute;
    top:0; left:0; right:0;
    padding: 18px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:5;
    background: linear-gradient(180deg, #000000aa, transparent);
  }
  .scanner-mode-badge{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform:uppercase;
    color: var(--amber-bright);
    background: #00000080;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--amber);
  }
  .scanner-close{
    width:36px; height:36px;
    border-radius:50%;
    background:#00000080;
    display:flex; align-items:center; justify-content:center;
    color: var(--paper);
    font-size: 18px;
  }
  .scanner-bottom{
    padding: 18px 20px 28px;
    background: #0a0907;
    text-align:center;
  }
  .scanner-hint{
    font-size: 13px;
    color: var(--paper-dim);
    margin-bottom: 4px;
  }
  .scanner-manual{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--amber-bright);
    text-decoration: underline;
    margin-top: 10px;
    display:inline-block;
  }
  .scan-feedback{
    position:absolute;
    inset:0;
    background: var(--good);
    opacity:0;
    pointer-events:none;
  }
  .scan-feedback.flash{
    animation: flashgood .35s ease-out;
  }
  @keyframes flashgood{
    0%{ opacity:0.55; }
    100%{ opacity:0; }
  }

  /* ---------- modal sheet ---------- */
  .sheet-backdrop{
    position:fixed;
    inset:0;
    background: #000000a0;
    z-index:90;
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }
  .sheet{
    width:100%;
    max-width: 560px;
    max-height: 88vh;
    overflow-y:auto;
    background: var(--bg-raised);
    border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--hairline);
    padding: 10px 22px 28px;
    animation: sheetup .22s ease-out;
  }
  @keyframes sheetup{
    from{ transform: translateY(100%); }
    to{ transform: translateY(0); }
  }
  .sheet-handle{
    width:36px; height:4px;
    background: var(--groove);
    border-radius:3px;
    margin: 8px auto 14px;
  }
  .sheet-title{
    font-family: var(--font-display);
    font-size: 21px;
    font-weight:600;
    color: var(--paper);
    margin-bottom: 2px;
  }
  .sheet-sub{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing:0.05em;
    margin-bottom: 18px;
  }
  .field{
    margin-bottom: 14px;
  }
  .field label{
    display:block;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform:uppercase;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }
  .field input, .field select, .field textarea{
    width:100%;
    background: var(--bg-card);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--ink);
    font-size: 15px;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none;
    border-color: var(--amber);
  }
  .field-row{
    display:flex;
    gap: 10px;
  }
  .field-row .field{ flex:1; }

  .btn{
    width:100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    text-align:center;
    margin-top: 6px;
  }
  .btn-primary{
    background: linear-gradient(180deg, var(--amber-bright), var(--amber));
    color: #1a1306;
  }
  .btn-primary:active{ filter: brightness(0.92); }
  .btn-secondary{
    background: var(--bg-card);
    color: var(--paper-dim);
    border: 1px solid var(--hairline);
  }
  .btn-danger{
    background: transparent;
    color: var(--rust);
    font-size: 13px;
    padding: 10px;
  }
  .btn-row{
    display:flex;
    gap: 10px;
    margin-top: 14px;
  }
  .btn-row .btn{ margin-top:0; }

  .barcode-chip{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--amber-bright);
    background: #0000003a;
    border: 1px dashed var(--amber);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 16px;
    display:flex;
    align-items:center;
    gap: 8px;
  }

  /* ---------- barcode preview / labels sheet ---------- */
  .barcode-preview-box{
    background: #f2ead8;
    border-radius: 14px;
    padding: 22px 12px 14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom: 18px;
  }
  .barcode-preview-box svg{ max-width:100%; }
  .barcode-preview-label{
    font-family: var(--font-display);
    font-size: 13px;
    color: #2a2718;
    text-align:center;
    margin-top: 4px;
    padding: 0 8px;
    line-height:1.4;
  }
  .labels-options-row{
    display:flex;
    gap:10px;
    margin-bottom:14px;
  }
  .labels-sample-strip{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    max-height: 200px;
    overflow-y:auto;
    background:#00000020;
    border-radius:10px;
    padding:12px;
    margin-bottom:14px;
  }
  .labels-sample-strip svg{ background:#f2ead8; border-radius:6px; padding:4px; }

  /* ---------- detail card sheet ---------- */
  .detail-disc{
    width: 64px; height:64px;
    border-radius:50%;
    margin: 0 auto 14px;
    background:
      radial-gradient(circle at center, var(--paper) 0 6px, #0c0b08 6.5px 8px, var(--groove) 9px 25px, #0c0b08 25.5px 27px, var(--groove) 27.5px 32px);
    box-shadow: inset 0 0 0 1px #00000080, 0 4px 14px #00000055;
  }
  .detail-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 16px;
    margin: 16px 0;
    padding: 14px;
    background: var(--bg-card);
    border-radius: 12px;
  }
  .detail-grid .dt{
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: var(--ink-dim);
  }
  .detail-grid .dd{
    font-size: 14px;
    color: var(--paper);
    margin-top:2px;
  }

  .qty-stepper{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 22px;
    margin: 18px 0;
  }
  .qty-btn{
    width: 42px; height:42px;
    border-radius:50%;
    background: var(--bg-card);
    border: 1px solid var(--hairline);
    font-size: 20px;
    color: var(--paper);
    display:flex; align-items:center; justify-content:center;
  }
  .qty-value{
    font-family: var(--font-mono);
    font-size: 28px;
    color: var(--amber-bright);
    min-width: 50px;
    text-align:center;
  }

  .wh-qty-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 9px 0;
    border-bottom: 1px solid var(--hairline);
  }
  .wh-qty-row:last-child{ border-bottom:none; }
  .wh-qty-name{
    font-size: 13px;
    color: var(--paper-dim);
  }
  .qty-stepper-sm{
    gap: 12px;
    margin: 0;
  }
  .qty-btn-sm{
    width: 30px; height:30px;
    font-size: 16px;
  }
  .qty-value-sm{
    font-size: 17px;
    min-width: 28px;
  }

  /* ---------- inventory mode ---------- */
  .inv-banner{
    background: linear-gradient(135deg, #2a1f10, #1d1a14);
    border: 1px solid var(--amber);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 18px;
  }
  .inv-banner .it{
    font-family: var(--font-display);
    font-size: 17px;
    color: var(--amber-bright);
    margin-bottom: 4px;
  }
  .inv-banner .id{
    font-size: 12px;
    color: var(--paper-dim);
    line-height:1.5;
  }
  .inv-stats{
    display:flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  .inv-stat{
    flex:1;
    background: var(--bg-card);
    border-radius: 12px;
    padding: 14px 10px;
    text-align:center;
  }
  .inv-stat .n{
    font-family: var(--font-mono);
    font-size: 24px;
    color: var(--paper);
  }
  .inv-stat.scanned .n{ color: var(--good); }
  .inv-stat.unexpected .n{ color: var(--rust); }
  .inv-stat .l{
    font-size: 9px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: var(--ink-dim);
    margin-top: 4px;
  }
  .inv-feed-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--hairline);
    font-size: 13px;
  }
  .inv-feed-item .tag{
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 3px 7px;
    border-radius: 5px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    flex-shrink:0;
  }
  .tag-new{ background:#4a7a3a33; color: var(--good); }
  .tag-dup{ background:#8d847233; color: var(--ink-dim); }
  .tag-unknown{ background:#b6502f33; color: var(--rust); }
  .inv-feed-name{ flex:1; color: var(--paper); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .start-inv-card{
    text-align:center;
    padding: 40px 24px;
  }
  .start-inv-card .vinyl-spin{
    width: 90px; height:90px;
    margin: 0 auto 22px;
    border-radius:50%;
    background:
      radial-gradient(circle at center, var(--amber) 0 8px, #0c0b08 8.5px 10px, var(--groove) 11px 30px, #0c0b08 30.5px 32px, var(--groove) 32.5px 38px);
    box-shadow: 0 8px 24px #00000066;
  }
  .start-inv-card h2{
    font-family: var(--font-display);
    font-size: 21px;
    color: var(--paper);
    margin-bottom: 8px;
  }
  .start-inv-card p{
    font-size: 13px;
    color: var(--ink-dim);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .report-section{
    margin-bottom: 22px;
  }
  .report-title{
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color: var(--ink-dim);
    margin-bottom: 10px;
  }
  .report-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 10px 12px;
    background: var(--bg-card);
    border-radius: 10px;
    margin-bottom:6px;
  }
  .report-row .rn{ font-size:14px; color: var(--paper); }

  .toast{

    padding: 11px 20px;

  /* ---------- import flow ---------- */
  .import-dropzone{

    margin-bottom: 16px;
    transition: background .15s;
  }
  .import-dropzone:active{ background: #00000040; }
  .import-dropzone .ic{ font-size:28px; margin-bottom:8px; color: var(--amber-bright); }
  .import-dropzone .tt{
    font-family: var(--font-display);
    font-size: 16px;
    color: var(--paper);
    margin-bottom: 4px;
  }
  .import-dropzone .dd{
    font-size: 12px;
    color: var(--ink-dim);
  }
  .import-step-label{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color: var(--amber-bright);
    margin-bottom: 10px;
  }
  .map-row{
    display:flex;
    align-items:center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .map-row label{
    width: 130px;
    flex-shrink:0;
    font-size: 13px;
    color: var(--paper-dim);
  }
  .map-row select{
    flex:1;
    background: var(--bg-card);
    border: 1px solid var(--hairline);
    border-radius: 9px;
    padding: 9px 10px;
    color: var(--ink);
    font-size: 13px;
  }
  .barcode-scheme-box{
    background: var(--bg-card);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 12px 14px;
    margin: 14px 0;
  }
  .barcode-scheme-box .lbl{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: var(--ink-dim);
    margin-bottom: 8px;
  }
  .scheme-preview{
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--amber-bright);
    background: #0000003a;
    border-radius: 7px;
    padding: 7px 10px;
    margin-top: 8px;
  }
  .import-preview-table{
    width:100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-bottom: 14px;
  }
  .import-preview-table th{
    text-align:left;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color: var(--ink-dim);
    padding: 6px 8px;
    border-bottom: 1px solid var(--hairline);
  }
  .import-preview-table td{
    padding: 7px 8px;
    color: var(--paper-dim);
    border-bottom: 1px solid var(--hairline);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 140px;
  }
  .import-summary-box{
    display:flex;
    gap:10px;
    margin: 14px 0;
  }
  .import-summary-stat{
    flex:1;
    background: var(--bg-card);
    border-radius: 10px;
    padding: 12px;
    text-align:center;
  }
  .import-summary-stat .n{ font-family: var(--font-mono); font-size: 20px; color: var(--paper); }
  .import-summary-stat.new .n{ color: var(--good); }
  .import-summary-stat.dup .n{ color: var(--ink-dim); }
  .import-summary-stat .l{ font-size: 9px; letter-spacing:0.06em; text-transform:uppercase; color: var(--ink-dim); margin-top:3px; }
  .radio-row{
    display:flex;
    gap: 10px;
    margin: 10px 0 4px;
  }
  .radio-opt{
    flex:1;
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--ink-dim);
    text-align:center;
    cursor:pointer;
  }
  .radio-opt.selected{
    border-color: var(--amber);
    color: var(--amber-bright);
    background: #d98c2b14;
  }


  /* ---- AUTH SCREENS ---- */
  .auth-screen{
    position:fixed; inset:0; z-index:1000;
    background: var(--bg);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding: 32px 24px; text-align:center;
  }
  .auth-screen .vinyl-mark{
    width:80px; height:80px; border-radius:50%; margin:0 auto 24px;
    background: radial-gradient(circle at center, var(--amber) 0 8px, #0c0b08 8.5px 10px, var(--groove) 11px 30px, #0c0b08 30.5px 32px, var(--groove) 32.5px 40px);
    box-shadow: 0 8px 24px #00000066;
  }
  .auth-screen h1{ font-family:var(--font-display); font-size:28px; color:var(--paper); margin-bottom:6px; }
  .auth-screen .sub{ font-size:13px; color:var(--ink-dim); margin-bottom:32px; line-height:1.5; }
  .google-btn{
    display:flex; align-items:center; gap:12px;
    background:#fff; color:#3c4043; border:none; border-radius:12px;
    padding:13px 24px; font-size:15px; font-weight:600;
    cursor:pointer; box-shadow:0 2px 8px #00000033;
    transition: box-shadow .15s, transform .1s; font-family:inherit;
  }
  .google-btn:active{ transform:scale(0.97); }
  .google-btn svg{ width:20px; height:20px; flex-shrink:0; }
  .auth-user-chip{
    display:flex; align-items:center; gap:8px;
    background:var(--bg-card); border:1px solid var(--hairline);
    border-radius:20px; padding:6px 12px 6px 6px;
    font-size:12px; color:var(--ink-dim); margin-bottom:16px;
  }
  .auth-user-chip img{ width:24px; height:24px; border-radius:50%; }
  .user-card{
    background:var(--bg-card); border:1px solid var(--hairline);
    border-radius:12px; padding:12px 14px; margin-bottom:8px;
  }
  .user-card-top{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .user-card-top img{ width:36px; height:36px; border-radius:50%; flex-shrink:0; }
  .user-card-info{ flex:1; min-width:0; }
  .user-card-name{ font-size:14px; color:var(--paper); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-card-email{ font-size:11px; color:var(--ink-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-status-badge{
    font-family:var(--font-mono); font-size:9px; letter-spacing:.06em;
    text-transform:uppercase; padding:3px 8px; border-radius:6px; flex-shrink:0;
  }
  .badge-pending{ background:#d98c2b22; color:var(--amber-bright); }
  .badge-approved{ background:#6f945622; color:#8bc469; }
  .badge-admin{ background:#4a6fa522; color:#7aabf5; }
  .badge-rejected{ background:#b6502f22; color:var(--rust); }
  .user-actions{ display:flex; gap:8px; flex-wrap:wrap; }
  .user-action-btn{
    font-family:var(--font-mono); font-size:10px; letter-spacing:.05em;
    padding:6px 10px; border-radius:8px; cursor:pointer;
    border:1px solid var(--hairline); background:var(--bg-raised); color:var(--ink-dim);
  }
  .user-action-btn.danger{ color:var(--rust); }
  .user-action-btn.primary{ color:#8bc469; }
  .topbar-user-wrap{ display:flex; align-items:center; gap:8px; }
  .topbar-avatar{ width:30px; height:30px; border-radius:50%; object-fit:cover; cursor:pointer; border:2px solid var(--amber); display:none; }
  #admin-btn{ font-family:var(--font-mono); font-size:10px; color:var(--amber-bright); background:none; border:none; cursor:pointer; padding:4px 8px; display:none; }

<!-- ===== AUTH SCREENS ===== -->
<div class="auth-screen" id="auth-screen" style="display:flex">
  <div class="vinyl-mark"></div>
  <h1>КРУГ</h1>
  <div class="sub">Каталог пластинок<br>Войдите через Google чтобы продолжить</div>
  <button class="google-btn" id="google-signin-btn">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Войти через Google
  </button>
</div>

<div class="auth-screen" id="pending-screen" style="display:none">
  <div class="vinyl-mark"></div>
  <div style="font-size:36px;margin-bottom:12px">⏳</div>

<div class="topbar">

</div>

var qrcode = function() {

  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = new Array();

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }

      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        while (true) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;

          }

      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxEcCount = Math.max(maxEcCount, ecCount);

        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {

    _this.write = function(buffer) {

      var i = 0;

      while (i + 1 < s.length) {
        buffer.put(
          getCode(s.charAt(i) ) * 45 +
          getCode(s.charAt(i + 1) ), 11);
        i += 2;
      }

      if (i < s.length) {
        buffer.put(getCode(s.charAt(i) ), 6);
      }
    };

    var getCode = function(c) {

      if ('0' <= c && c <= '9') {
        return c.charCodeAt(0) - '0'.charCodeAt(0);
      } else if ('A' <= c && c <= 'Z') {
        return c.charCodeAt(0) - 'A'.charCodeAt(0) + 10;
      } else {
        switch (c) {
        case ' ' : return 36;
        case '$' : return 37;
        case '%' : return 38;
        case '*' : return 39;
        case '+' : return 40;
        case '-' : return 41;
        case '.' : return 42;
        case '/' : return 43;
        case ':' : return 44;

          throw 'illegal char :' + c;
        }
      }
    };

  };

    var _mode = QRMode.MODE_KANJI;

    };

    _this.write = function(buffer) {

      var data = _bytes;

      var i = 0;

      while (i + 1 < data.length) {

        var c = ( (0xff & data[i]) << 8) | (0xff & data[i + 1]);

        if (0x8140 <= c && c <= 0x9FFC) {
          c -= 0x8140;
        } else if (0xE040 <= c && c <= 0xEBBF) {
          c -= 0xC140;
        } else {
          throw 'illegal char at ' + (i + 1) + '/' + c;
        }

        c = ( (c >>> 8) & 0xff) * 0xC0 + (c & 0xff);

        buffer.put(c, 13);

        i += 2;
      }

      if (i < data.length) {
        throw 'illegal char at ' + (i + 1);
      }
    };

    return _this;

<!-- Firebase auth & admin logic -->
<script>
(function(){

  // ====================== FIREBASE SETUP ======================
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCxjUPfrDeHPQAEBlWQOFSdBDauLnF0E_M",
    authDomain: "vinyl-catalog-1ee9d.firebaseapp.com",
    projectId: "vinyl-catalog-1ee9d",
    storageBucket: "vinyl-catalog-1ee9d.firebasestorage.app",
    messagingSenderId: "358155128875",
    appId: "1:358155128875:web:b6f7dd0e82de606dc99a6e"
  };

  firebase.initializeApp(FIREBASE_CONFIG);
  const auth = firebase.auth();
  const db = firebase.firestore();
  window.db = db;

  // Offline persistence: unsent writes survive page reloads / connectivity
  // drops (stored in IndexedDB, not just in-memory), and sync automatically
  // once the connection is back. This is the main defense against losing
  // in-progress edits if the app is reloaded right after a change.
  db.enablePersistence({ synchronizeTabs: true }).catch(err=>{
    console.warn('Firestore persistence not enabled:', err.code);
  });

  let currentUser = null;
  let currentProfile = null;

  // ====================== SCREEN CONTROL ======================
  function escFb(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function showAuthScreen(){
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('pending-screen').style.display='none';
    document.getElementById('app-root').style.display='none';
  }
  function showPendingScreen(user){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('pending-screen').style.display='flex';
    document.getElementById('app-root').style.display='none';
    const chip=document.getElementById('pending-user-chip');
    if(chip) chip.innerHTML=(user.photoURL?`<img src="${escFb(user.photoURL)}" alt=""> `:'')+escFb(user.email);
  }
  function showApp(profile){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('pending-screen').style.display='none';
    document.getElementById('app-root').style.display='block';
    if(currentUser&&currentUser.photoURL){
      const av=document.getElementById('topbar-avatar');
      if(av){av.src=currentUser.photoURL;av.style.display='block';}
    }
    if(profile&&profile.role==='admin'){
      const ab=document.getElementById('admin-btn');
      if(ab) ab.style.display='inline-block';
    }
  }

  // ====================== SIGN IN / OUT ======================
  let signingIn = false;
  document.getElementById('google-signin-btn').addEventListener('click',async()=>{
    if(signingIn) return;
    signingIn = true;
    const btn = document.getElementById('google-signin-btn');
    if(btn){ btn.style.opacity='0.6'; btn.style.pointerEvents='none'; }
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
    }catch(e){
      // cancelled-popup-request = user opened another popup or double-clicked; safe to ignore
      if(e.code !== 'auth/cancelled-popup-request' && e.code !== 'auth/popup-closed-by-user'){
        alert('Ошибка входа: '+(e.message||e));
      }
    } finally {
      signingIn = false;
      if(btn){ btn.style.opacity=''; btn.style.pointerEvents=''; }
    }
  });
  document.getElementById('signout-btn').addEventListener('click',()=>auth.signOut());
  document.getElementById('pending-signout-btn').addEventListener('click',()=>auth.signOut());
  document.getElementById('topbar-avatar').addEventListener('click',()=>{
    openSheet(`
      <div class="sheet-handle"></div>
      <div class="sheet-title">Аккаунт</div>
      <div class="auth-user-chip" style="justify-content:center;margin:12px 0 18px">
        ${currentUser&&currentUser.photoURL?`<img src="${escFb(currentUser.photoURL)}" alt="">`:''}
        ${escFb(currentUser&&currentUser.email||'')}
      </div>
      <button class="btn btn-secondary" id="sheet-signout">Выйти из аккаунта</button>
    `);
    document.getElementById('sheet-signout').onclick=()=>{ closeSheet(); auth.signOut(); };
  });

  // ====================== AUTH STATE ======================
  auth.onAuthStateChanged(async(user)=>{
    if(!user){
      currentUser=null; currentProfile=null;
      if(window.catalogUnsubscribe){window.catalogUnsubscribe();window.catalogUnsubscribe=null;}
      showAuthScreen(); return;
    }
    currentUser=user;
    const userRef=db.collection('users').doc(user.uid);
    const snap=await userRef.get();
    if(!snap.exists){
      await userRef.set({
        uid:user.uid, email:user.email,
        name:user.displayName||'', photoURL:user.photoURL||'',
        status:'pending', role:'user',
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      currentProfile={status:'pending',role:'user'};
    } else {
      currentProfile=snap.data();
    }
    if(currentProfile.status==='approved'||currentProfile.role==='admin'){
      showApp(currentProfile);
      if(window.initAppWithFirebase) window.initAppWithFirebase();
    } else {
      showPendingScreen(user);
    }
  });

  // ====================== ADMIN PANEL ======================
  window.openAdminPanel = function(){
    if(!currentProfile||currentProfile.role!=='admin'){ toast('Только для администраторов'); return; }
    openSheet(`
      <div class="sheet-handle"></div>
      <div class="sheet-title">Управление доступом</div>
      <div class="sheet-sub">Пользователи системы</div>

      <div class="btn-row" style="margin-bottom:16px">
        <button class="btn btn-secondary" id="admin-backup-btn">Скачать резервную копию каталога</button>
      </div>

      <div id="admin-users-list"><div class="empty-state"><div class="desc">Загрузка…</div></div></div>
    `);
    document.getElementById('admin-backup-btn').onclick = downloadCatalogBackup;
    db.collection('users').orderBy('createdAt','desc').get().then(snap=>{
      const list=document.getElementById('admin-users-list');
      if(!list) return;
      if(snap.empty){list.innerHTML='<div class="empty-state"><div class="desc">Нет пользователей</div></div>';return;}
      list.innerHTML=snap.docs.map(doc=>{
        const u=doc.data();
        const isAdmin=u.role==='admin';
        const bc=isAdmin?'badge-admin':u.status==='approved'?'badge-approved':u.status==='rejected'?'badge-rejected':'badge-pending';
        const bt=isAdmin?'Администратор':u.status==='approved'?'Одобрен':u.status==='rejected'?'Отклонён':'Ожидает';
        const acts=[];
        if(!isAdmin&&u.status!=='approved') acts.push(`<button class="user-action-btn primary" onclick="fbSetStatus('${doc.id}','approved')">✓ Одобрить</button>`);
        if(!isAdmin&&u.status!=='rejected') acts.push(`<button class="user-action-btn danger" onclick="fbSetStatus('${doc.id}','rejected')">✗ Отклонить</button>`);
        if(!isAdmin&&doc.id!==currentUser.uid) acts.push(`<button class="user-action-btn" onclick="fbSetRole('${doc.id}','admin')">↑ Сделать адм.</button>`);
        if(isAdmin&&doc.id!==currentUser.uid) acts.push(`<button class="user-action-btn danger" onclick="fbSetRole('${doc.id}','user')">↓ Убрать адм.</button>`);
        return `<div class="user-card">
          <div class="user-card-top">
            ${u.photoURL?`<img src="${escFb(u.photoURL)}" alt="">`:
              '<div style="width:36px;height:36px;border-radius:50%;background:var(--groove);flex-shrink:0"></div>'}
            <div class="user-card-info">
              <div class="user-card-name">${escFb(u.name||u.email)}</div>
              <div class="user-card-email">${escFb(u.email)}</div>
            </div>
            <span class="user-status-badge ${bc}">${bt}</span>
          </div>
          ${acts.length?`<div class="user-actions">${acts.join('')}</div>`:''}
        </div>`;
      }).join('');
    }).catch(e=>{ toast('Ошибка загрузки пользователей: '+e.message); });
  };

  async function downloadCatalogBackup(){
    toast('Собираю резервную копию…');
    try{
      const snap = await db.collection('catalog').get();
      const data = snap.docs.map(d => d.data());
      const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `backup_catalog_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      toast(`Резервная копия сохранена (${data.length} позиций)`);
    }catch(e){
      toast('Не удалось собрать резервную копию: ' + e.message);
    }
  }

  window.fbSetStatus=async(uid,status)=>{
    try{ await db.collection('users').doc(uid).update({status}); toast(status==='approved'?'Доступ открыт':'Доступ закрыт'); window.openAdminPanel(); }
    catch(e){ toast('Ошибка: '+e.message); }
  };
  window.fbSetRole=async(uid,role)=>{
    try{ await db.collection('users').doc(uid).update({role}); toast(role==='admin'?'Назначен администратором':'Роль снята'); window.openAdminPanel(); }
    catch(e){ toast('Ошибка: '+e.message); }
  };

})();
</script>

    try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; }catch(e){ return []; }
  }
  function saveCatalog(cat){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cat));
    pushCatalogToFirestore(cat);
  }
  function loadInvSession(){
    try{ const raw = localStorage.getItem(INV_KEY); return raw ? JSON.parse(raw) : null; }catch(e){ return null; }
  }
  function saveInvSession(s){
    if(s===null){ localStorage.removeItem(INV_KEY); return; }
    localStorage.setItem(INV_KEY, JSON.stringify(s));
  }
  // Push catalog changes to Firestore (fire-and-forget)
  function pushCatalogToFirestore(cat){
    if(!window.db) return;
    const batch = window.db.batch();
    cat.forEach(r=>{
      const ref = window.db.collection('catalog').doc(r.id);
      batch.set(ref, r);
    });
    batch.commit().catch(e=>console.warn('Firestore write error:', e));
  }
  // Pull catalog from Firestore (once, used during init)
  async function pullCatalogFromFirestore(){
    if(!window.db) return null;
    try{
      const snap = await window.db.collection('catalog').get();
      if(snap.empty) return null;
      return snap.docs.map(d=>d.data());
    }catch(e){ console.warn('Firestore read error:', e); return null; }
  }
  // Save a single record to Firestore
  function saveRecordToFirestore(record){
    if(!window.db) return;
    window.db.collection('catalog').doc(record.id).set(record)
      .catch(e=>console.warn('Firestore record write error:', e));
  }
  // Delete a record from Firestore
  function deleteRecordFromFirestore(id){
    if(!window.db) return;
    window.db.collection('catalog').doc(id).delete()
      .catch(e=>console.warn('Firestore delete error:', e));
  }

  let catalog = loadCatalog(); // [{id, barcode, artist, title, year, label, condition, qty, addedAt}]

  /* ====================== WAREHOUSES ====================== */
  const WAREHOUSES = ['Lemonade bar', 'WaxBrew Textura', 'WaxBrew TreCanne'];

  function emptyQtyMap(){
    const m = {};
    WAREHOUSES.forEach(w => m[w] = 0);
    return m;
  }

  // Migrates legacy numeric qty (single number) into a per-warehouse map.
  // Legacy records are assumed to belong to "Lemonade bar" per user instruction.
  function normalizeQty(record){
    if(record.qty === null || record.qty === undefined){
      record.qty = emptyQtyMap();
      return record;
    }
    if(typeof record.qty === 'number'){
      const legacy = record.qty;
      record.qty = emptyQtyMap();
      record.qty['Lemonade bar'] = legacy;
      return record;
    }
    // already an object - make sure all warehouses present
    WAREHOUSES.forEach(w=>{
      if(typeof record.qty[w] !== 'number') record.qty[w] = 0;
    });
    return record;
  }

  function totalQty(record){
    return WAREHOUSES.reduce((s,w)=>{
      const v = record.qty[w];
      const n = typeof v === 'number' && !isNaN(v) ? v : 0;
      return s + n;
    }, 0);
  }

  function makeImportQty(warehouse, amount){
    const m = emptyQtyMap();
    if(warehouse && WAREHOUSES.includes(warehouse)){
      m[warehouse] = amount || 0;
    }
    return m;
  }

  /* ====================== BARCODE GENERATION & DOWNLOAD ====================== */

  // Builds a QR code using the embedded qrcode-generator library (no CDN dependency).
  // Automatically picks the smallest QR "type" (version) that fits the text,
  // since this library does not support type=0 auto-detection directly.
  function makeQrAuto(text, ecLevel){
    for(let typeNumber=1; typeNumber<=40; typeNumber++){
      try{
        const qr = qrcode(typeNumber, ecLevel || 'M');
        qr.addData(text);
        qr.make();
        return qr;
      }catch(e){
        if(typeNumber === 40) throw e;
        continue;
      }
    }
  }

  // Renders a QR code for `text` into the given <svg> DOM element.
  function renderQrIntoSvgEl(svgEl, text, cellSize, margin){
    const qr = makeQrAuto(text);
    const svgMarkup = qr.createSvgTag(cellSize || 5, margin !== undefined ? margin : 10);
    // createSvgTag returns a full <svg>...</svg> string; copy its inner content
    // and attributes onto the existing svgEl so the element reference stays valid.
    const parser = new DOMParser();
    const parsed = parser.parseFromString(svgMarkup, 'image/svg+xml');
    const sourceSvg = parsed.documentElement;
    svgEl.setAttribute('viewBox', sourceSvg.getAttribute('viewBox'));
    svgEl.setAttribute('width', sourceSvg.getAttribute('width'));
    svgEl.setAttribute('height', sourceSvg.getAttribute('height'));
    svgEl.innerHTML = sourceSvg.innerHTML;
  }

  // Converts an in-DOM <svg> element (e.g. a rendered QR code) into a downloadable PNG.
  // labelText (optional) is drawn below the barcode image, useful for printable labels.
  function svgToPngDownload(svgEl, filename, labelText){
    const svgString = new XMLSerializer().serializeToString(svgEl);
    const svgBlob = new Blob([svgString], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = ()=>{
      const padding = 16;
      const labelHeight = labelText ? 26 : 0;
      const canvas = document.createElement('canvas');
      canvas.width = img.width + padding*2;
      canvas.height = img.height + padding*2 + labelHeight;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#f2ead8';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img, padding, padding);
      if(labelText){
        ctx.fillStyle = '#2a2718';
        ctx.font = '13px Georgia, serif';
        ctx.textAlign = 'center';
        wrapCanvasText(ctx, labelText, canvas.width/2, padding + img.height + 16, canvas.width - padding*2, 14);
      }
      URL.revokeObjectURL(url);
      canvas.toBlob(blob=>{
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
      }, 'image/png');
    };
    img.src = url;
  }

  function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight){
    const words = text.split(' ');
    let line = '';
    let curY = y;
    for(let i=0;i<words.length;i++){
      const testLine = line + words[i] + ' ';
      if(ctx.measureText(testLine).width > maxWidth && line !== ''){
        ctx.fillText(line.trim(), x, curY);
        line = words[i] + ' ';
        curY += lineHeight;
      } else {
        line = testLine;
      }
    }
    ctx.fillText(line.trim(), x, curY);
  }

  function safeFilename(s){
    return String(s).replace(/[^a-zA-Zа-яА-Я0-9 _-]/g,'').trim().replace(/\s+/g,'_').slice(0,60) || 'barcode';

  // Renders a QR code for `code` to a PNG data URL via an offscreen SVG image.
  // Returns a Promise so callers can await it instead of juggling callbacks.
  function renderBarcodeToDataUrl(code){
    return new Promise((resolve, reject)=>{
      let svgString;
      try{
        const qr = makeQrAuto(code);
        svgString = qr.createSvgTag(6, 12);
      }catch(e){
        reject(e);
        return;
      }
      const svgBlob = new Blob([svgString], {type:'image/svg+xml;charset=utf-8'});
      const url = URL.createObjectURL(svgBlob);
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        resolve({dataUrl: canvas.toDataURL('image/png'), width: img.width, height: img.height});
      };
      img.onerror = (e)=>{
        URL.revokeObjectURL(url);
        reject(e);
      };
      img.src = url;
    });
  }

  async function generateBulkLabelSheet(records, warehouse){
    if(records.length === 0){
      toast('Нет позиций со штрих-кодом для печати');
      return;
    }
    if(typeof window.jspdf === 'undefined'){
      toast('Библиотека PDF не загрузилась. Проверьте интернет-соединение и откройте приложение заново.');
      return;
    }

    toast('Собираю PDF с этикетками…');

    try{
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });

      const pageW = 210;
      const pageH = 297;
      const cols = 3;
      const rowsPerPage = 8;
      const cellW = 60;   // mm
      const cellH = 30;   // mm
      // Centre the grid on the page
      const marginX = (pageW - cols * cellW) / 2;       // 15 mm
      const marginY = (pageH - rowsPerPage * cellH) / 2; // 28.5 mm

      let col = 0, row = 0, renderedCount = 0;
      doc.setFillColor(255,255,255);
      doc.rect(0,0,pageW,pageH,'F');

      for(let i = 0; i < records.length; i++){
        const r = records[i];
        let barcodeImg;
        try{
          barcodeImg = await renderBarcodeToDataUrl(r.barcode);
        }catch(e){
          continue;
        }

        if(row >= rowsPerPage){
          doc.addPage();
          doc.setFillColor(255,255,255);
          doc.rect(0,0,pageW,pageH,'F');
          row = 0; col = 0;
        }

        const cellX = marginX + col * cellW;
        const cellY = marginY + row * cellH;

        // Cell border — thin cut line
        doc.setDrawColor(180,175,165);
        doc.setLineWidth(0.15);
        doc.rect(cellX, cellY, cellW, cellH);

        // QR code — square, centred in top portion of cell
        // Cell is 60×30mm: leave 2mm padding all around, text at bottom ~6mm
        const qrMaxSize = cellH - 8;        // 22 mm max (leaves 6mm for text)
        const qrSize = Math.min(qrMaxSize, cellW - 4); // also fits width
        const qrX = cellX + (cellW - qrSize) / 2;
        const qrY = cellY + 2;
        doc.addImage(barcodeImg.dataUrl, 'PNG', qrX, qrY, qrSize, qrSize);

        // Label text — the barcode text itself, so it's readable without scanning
        const label = r.barcode;
        doc.setTextColor(30,28,20);
        doc.setFontSize(7);
        const textLines = doc.splitTextToSize(label, cellW - 4);
        doc.text(textLines.slice(0,2), cellX + cellW / 2, qrY + qrSize + 3.5, { align: 'center' });

        col++;
        if(col >= cols){ col = 0; row++; }
        renderedCount++;
      }

      if(renderedCount === 0){
        toast('Не удалось построить ни одного QR-кода');
        return;
      }

      const whSuffix = warehouse ? '_' + safeFilename(warehouse) : '';
      doc.save(`этикетки${whSuffix}_${new Date().toISOString().slice(0,10)}.pdf`);
      closeSheet();
      toast(`PDF с этикетками сохранён (${renderedCount})`);
    }catch(err){
      toast('Не удалось собрать PDF: ' + (err && err.message ? err.message : 'неизвестная ошибка'));
    }
  }

  function colLetter(i){
    let s = '';
    i++;
    while(i>0){
      const m = (i-1)%26;
      s = String.fromCharCode(65+m) + s;
      i = Math.floor((i-1)/26);
    }
    return s;
  }

  // Robustly parses a price string into a number, regardless of which
  // decimal separator was used (period, comma, or visually similar Unicode
  // separators that sometimes appear when data is copy-pasted from other
  // locales/sources). Also strips thousands-separator spaces.
  function parsePriceValue(raw){
    if(raw === null || raw === undefined) return NaN;
    let s = String(raw).trim();
    if(s === '') return NaN;
    // Remove regular and non-breaking/thin spaces (sometimes used as thousands separators)
    s = s.replace(/[\s\u00A0\u2009\u202F]/g, '');
    // Normalize any comma-like or unusual decimal separator to a period.
    // Covers: ASCII comma, Arabic decimal separator, fullwidth comma, middle dot variants.
    s = s.replace(/[,\u066B\uFF0C\u060C]/g, '.');
    // If there are multiple periods (e.g. "1.234.50" where the first was a
    // thousands separator), keep only the last one as the decimal point.
    const parts = s.split('.');
    if(parts.length > 2){
      s = parts.slice(0, -1).join('') + '.' + parts[parts.length - 1];
    }
    const num = parseFloat(s);
    return num;
  }

  function parseImportRows(){
    const { rows, headerRowIdx, mapping, distFilter } = importState;
    const out = [];
    for(let i=headerRowIdx+1; i<rows.length; i++){
      const row = rows[i];
      const get = (idx)=> idx>=0 && idx<row.length ? String(row[idx]).trim() : '';
      const dist = get(mapping.dist);
      const cat = get(mapping.cat);
      const name = get(mapping.name);
      const style = get(mapping.style);
      const priceRaw = get(mapping.price);

      if(!name) continue; // skip empty/separator rows
      if(distFilter && dist.toUpperCase() !== distFilter.toUpperCase()) continue;

      // "artist" field now holds the full Release name as-is; "title" field holds Style.
      const artist = name;
      const title = style;

      const priceNum = parsePriceValue(priceRaw);
      const price = isNaN(priceNum) ? '' : priceNum;

      let barcode = '';
      if(dist && cat){
        barcode = (dist.toUpperCase().replace(/\s+/g,'') + ' ' + cat.toUpperCase().replace(/\s+/g,''));
      } else if(cat){
        barcode = cat.toUpperCase().replace(/\s+/g,'');
      }

      out.push({
        barcode, artist, title,
        style: style || '',
        price: price,
        dist, cat
      });
    }
    return out;
  }

  let zxingReader = null;
  let mediaStream = null;

  // Low-level decode: draws the current video frame to an offscreen canvas,
  // reads its pixels, converts them to single-byte grayscale luminance values
  // (RGBLuminanceSource expects pre-computed luminance, not raw RGBA), and
  // feeds them into ZXing's core decoder: RGBLuminanceSource -> HybridBinarizer
  // -> BinaryBitmap -> decode(). This bypasses all of the higher-level
  // "BrowserCodeReader" convenience methods, whose exact continuous-scan API
  // differs across versions/CDN builds — the core MultiFormatReader.decode()
  // call here is the stable, fundamental method present in every version.
  function decodeCurrentVideoFrame(){
    if(!scannerVideo.videoWidth || !scannerVideo.videoHeight) return null;
    if(!scanCanvas){
      scanCanvas = document.createElement('canvas');
      scanCanvasCtx = scanCanvas.getContext('2d', { willReadFrequently: true });
    }
    scanCanvas.width = scannerVideo.videoWidth;
    scanCanvas.height = scannerVideo.videoHeight;
    scanCanvasCtx.drawImage(scannerVideo, 0, 0, scanCanvas.width, scanCanvas.height);

    let imageData;
    try{
      imageData = scanCanvasCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
    }catch(e){
      return null; // frame not ready yet (e.g. tainted canvas during setup)
    }

    const rgba = imageData.data;
    const pixelCount = scanCanvas.width * scanCanvas.height;
    const luminances = new Uint8ClampedArray(pixelCount);
    for(let i = 0; i < pixelCount; i++){
      const offset = i * 4;
      // Standard luminance weighting (matches ZXing's own RGB->grayscale example)
      luminances[i] = (rgba[offset] + rgba[offset+1] * 2 + rgba[offset+2]) / 4;
    }

    const luminanceSource = new ZXing.RGBLuminanceSource(luminances, scanCanvas.width, scanCanvas.height);
    const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
    try{
      return zxingReader.decode(binaryBitmap);
    }catch(e){
      return null; // no code found in this frame — expected most of the time
    }
  }

  function startManualScanPolling(onResult){
    stopManualScanPolling();
    manualPollTimer = setInterval(()=>{
      const result = decodeCurrentVideoFrame();
      if(result) onResult(result);
    }, 300);
  }

  function stopManualScanPolling(){
    if(manualPollTimer){
      clearInterval(manualPollTimer);
      manualPollTimer = null;
    }
  }

  async function openScanner(mode){
    scannerMode = mode;
    scannerModeBadge.textContent = mode === 'catalog' ? 'Каталог' : 'Инвентаризация';
    scannerHint.textContent = 'Наведите камеру на штрих-код пластинки';
    scannerOverlay.classList.remove('hidden');
    scanLock = false;

    if(typeof window.ZXing === 'undefined'){
      scannerHint.textContent = 'Библиотека сканера ещё не загрузилась. Проверьте интернет-соединение и подождите пару секунд, затем попробуйте снова.';
      return;
    }

    try{
      mediaStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
      scannerVideo.srcObject = mediaStream;
      await scannerVideo.play();

      if(!zxingReader){
        zxingReader = new ZXing.MultiFormatReader();
        try{
          const hints = new Map();
          hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
          zxingReader.setHints(hints);
        }catch(hintErr){ /* hints are an optional optimization, safe to skip */ }
      }

      const onDecodeResult = (result)=>{
        if(result && !scanLock){
          scanLock = true;
          flashFeedback();
          handleScanResult(result.getText());
          setTimeout(()=>{ scanLock = false; }, 1400);
        }
      };

      startManualScanPolling(onDecodeResult);
    }catch(e){
      const name = e && e.name ? e.name : '';
      const msg = e && e.message ? e.message : String(e);
      if(name === 'NotAllowedError' || name === 'PermissionDeniedError'){
        scannerHint.textContent = 'Доступ к камере запрещён. Разрешите камеру в настройках браузера и откройте сканер снова.';
      } else if(name === 'NotFoundError' || name === 'DevicesNotFoundError'){
        scannerHint.textContent = 'Камера не найдена на этом устройстве. Введите код вручную.';
      } else if(name === 'OverconstrainedError' || name === 'ConstraintNotSatisfiedError'){
        scannerHint.textContent = 'Камера устройства не поддерживает запрошенный режим. Введите код вручную.';
      } else if(name === 'NotReadableError' || name === 'TrackStartError'){
        scannerHint.textContent = 'Камера занята другим приложением. Закройте его и попробуйте снова.';
      } else {
        scannerHint.textContent = 'Ошибка камеры: ' + (name || 'неизвестная') + ' — ' + msg;
      }
    }
  }

  function closeScanner(){
    scannerOverlay.classList.add('hidden');
    stopManualScanPolling();
    if(mediaStream){
      mediaStream.getTracks().forEach(t=>t.stop());
      mediaStream = null;
    }
  }

  document.getElementById('scanner-close').addEventListener('click', closeScanner);
  document.getElementById('scanner-manual-btn').addEventListener('click', ()=>{
    closeScanner();
    openManualBarcodeEntry();
  });

  document.getElementById('fab-scan').addEventListener('click', ()=>{
    openScanner(currentTab === 'inventory' ? 'inventory' : 'catalog');
  });

  function openManualBarcodeEntry(){
    openSheet(`
      <div class="sheet-handle"></div>
      <div class="sheet-title">Ввести код вручную</div>
      <div class="sheet-sub">Если камера недоступна или код повреждён</div>
      <div class="field">
        <label>Штрих-код</label>
        <input type="text" inputmode="numeric" id="manual-barcode" placeholder="Например, 4607032870016" autofocus />
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="manual-cancel">Отмена</button>
        <button class="btn btn-primary" id="manual-submit">Найти</button>
      </div>
    `);
    document.getElementById('manual-cancel').onclick = closeSheet;
    document.getElementById('manual-submit').onclick = ()=>{
      const code = document.getElementById('manual-barcode').value.trim();
      if(!code){ toast('Введите код'); return; }
      closeSheet();
      handleScanResult(code, true);
    };
  }

  function handleScanResult(barcode, fromManual){
    if(scannerMode === 'catalog'){
      closeScanner();
      const existing = catalog.find(r => r.barcode === barcode);
      if(existing){
        openRecordDetail(existing.id);
        toast('Найдено в каталоге');
      } else {
        openRecordForm(null, barcode);
      }
    } else {
      handleInventoryScan(barcode, fromManual);
    }
  }

  /* ====================== INVENTORY MODE ====================== */
  function ensureInvSession(){
    if(!invSession){
      invSession = {
        warehouse: null,      // selected before session truly starts
        startedAt: Date.now(),
        scannedIds: [],       // record ids found at least once
        scannedLog: [],       // {ts, barcode, status, recordId, name}
        unknownBarcodes: []   // {barcode, ts}
      };
      saveInvSession(invSession);
    }
  }

  function handleInventoryScan(barcode, fromManual){
    if(!invSession || !invSession.warehouse) return;
    const record = catalog.find(r => r.barcode === barcode);

    if(!record){
      invSession.unknownBarcodes.push({barcode, ts: Date.now()});
      invSession.scannedLog.unshift({ts: Date.now(), barcode, status:'unknown', recordId:null, name: barcode});
      saveInvSession(invSession);
      if(fromManual){ closeSheetIfOpen(); }
      toast('Штрих-код не найден в каталоге');
      renderInventoryView();
      return;
    }

    normalizeQty(record);
    const alreadyScanned = invSession.scannedIds.includes(record.id);
    const expectedHere = (record.qty[invSession.warehouse] || 0) > 0;

    if(!alreadyScanned){
      invSession.scannedIds.push(record.id);
      const status = expectedHere ? 'new' : 'unexpected';
      invSession.scannedLog.unshift({ts: Date.now(), barcode, status, recordId: record.id, name: `${record.artist} — ${record.title}`});
      toast(expectedHere ? `✓ ${record.artist || record.title}` : `⚠ Не ожидалось на этом складе: ${record.artist || record.title}`);
    } else {
      invSession.scannedLog.unshift({ts: Date.now(), barcode, status:'dup', recordId: record.id, name: `${record.artist} — ${record.title}`});
      toast(`Уже отсканировано: ${record.artist || record.title}`);
    }
    saveInvSession(invSession);
    if(fromManual) closeSheetIfOpen();
    renderInventoryView();
  }

  function closeSheetIfOpen(){
    if(!sheetBackdrop.classList.contains('hidden')) closeSheet();
  }

  function openWarehousePicker(){
    openSheet(`
      <div class="sheet-handle"></div>
      <div class="sheet-title">Выберите склад</div>
      <div class="sheet-sub">Инвентаризация проводится отдельно для каждого склада</div>
      ${WAREHOUSES.map(w => `<button class="btn btn-secondary wh-pick-btn" data-wh="${escapeHtml(w)}" style="margin-bottom:8px">${escapeHtml(w)}</button>`).join('')}
      <button class="btn btn-secondary" id="wh-pick-cancel" style="margin-top:6px">Отмена</button>
    `);
    sheetContent.querySelectorAll('.wh-pick-btn').forEach(btn=>{
      btn.onclick = ()=>{
        ensureInvSession();
        invSession.warehouse = btn.dataset.wh;
        saveInvSession(invSession);
        closeSheet();
        renderInventoryView();
      };
    });
    document.getElementById('wh-pick-cancel').onclick = closeSheet;
  }

  function renderInventoryView(){
    if(!invSession || !invSession.warehouse){
      viewInventory.innerHTML = `
        <div class="start-inv-card">
          <div class="vinyl-spin"></div>
          <h2>Начать инвентаризацию</h2>
          <p>Выберите склад, затем сканируйте пластинки подряд.<br>
          В конце увидите отчёт: что нашли, что отсутствует на этом складе,<br>
          и что отсканировано там, где не ожидалось.</p>
          <button class="btn btn-primary" id="start-inv-btn">Выбрать склад и начать</button>
        </div>
      `;
      document.getElementById('start-inv-btn').onclick = openWarehousePicker;
      return;
    }

    const warehouse = invSession.warehouse;
    const expectedRecords = catalog.filter(r => (normalizeQty(r).qty[warehouse]||0) > 0);
    const totalPositions = expectedRecords.length;
    const scannedExpectedCount = expectedRecords.filter(r => invSession.scannedIds.includes(r.id)).length;
    const missingCount = totalPositions - scannedExpectedCount;
    const unknownCount = invSession.unknownBarcodes.length;
    const unexpectedCount = invSession.scannedLog.filter(e => e.status === 'unexpected').length;

    const feedHtml = invSession.scannedLog.slice(0,30).map(entry=>{
      const tagClass = entry.status==='new' ? 'tag-new' : entry.status==='dup' ? 'tag-dup' : entry.status==='unexpected' ? 'tag-unexpected' : 'tag-unknown';
      const tagText = entry.status==='new' ? 'Найдено' : entry.status==='dup' ? 'Повтор' : entry.status==='unexpected' ? 'Не ожидалось' : 'Неизвестно';
      const time = new Date(entry.ts).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
      return `<div class="inv-feed-item">
        <span class="tag ${tagClass}">${tagText}</span>
        <span class="inv-feed-name">${escapeHtml(entry.name)}</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-dim)">${time}</span>
      </div>`;
    }).join('');

    viewInventory.innerHTML = `
      <div class="inv-banner">
        <div class="it">Инвентаризация: ${escapeHtml(warehouse)}</div>
        <div class="id">Начата ${new Date(invSession.startedAt).toLocaleString('ru-RU')}<br>
        Сканируйте пластинки кнопкой ниже — статус обновляется сразу.</div>
      </div>

      <div class="inv-stats">
        <div class="inv-stat scanned">
          <div class="n">${scannedExpectedCount}/${totalPositions}</div>
          <div class="l">Найдено</div>
        </div>
        <div class="inv-stat">
          <div class="n">${missingCount}</div>
          <div class="l">Не найдено</div>
        </div>
        <div class="inv-stat unexpected">
          <div class="n">${unexpectedCount + unknownCount}</div>
          <div class="l">Странности</div>
        </div>
      </div>

      <div class="btn-row" style="margin-bottom:18px">
        <button class="btn btn-secondary" id="switch-wh-btn">Сменить склад</button>
        <button class="btn btn-secondary" id="finish-inv-btn">Отчёт</button>
      </div>

      <div class="section-label">Лента сканирования</div>
      <div id="inv-feed">
        ${feedHtml || '<div class="empty-state" style="padding:30px 10px"><div class="desc">Пока ничего не отсканировано</div></div>'}
      </div>
    `;

    document.getElementById('finish-inv-btn').onclick = showInventoryReport;
    document.getElementById('switch-wh-btn').onclick = ()=>{
      invSession = null;
      saveInvSession(null);
      openWarehousePicker();
    };
  }

  function showInventoryReport(){
    const warehouse = invSession.warehouse;
    const expectedRecords = catalog.filter(r => (normalizeQty(r).qty[warehouse]||0) > 0);
    const totalPositions = expectedRecords.length;
    const scannedExpectedCount = expectedRecords.filter(r => invSession.scannedIds.includes(r.id)).length;
    const missingRecords = expectedRecords.filter(r => !invSession.scannedIds.includes(r.id));
    const unexpectedIds = [...new Set(invSession.scannedLog.filter(e=>e.status==='unexpected').map(e=>e.recordId))];
    const unexpectedRecords = unexpectedIds.map(id => catalog.find(r=>r.id===id)).filter(Boolean);
    const unknownList = invSession.unknownBarcodes;

    const missingHtml = missingRecords.length
      ? missingRecords.map(r=>`
        <div class="report-row">
          <div class="rn">${escapeHtml(r.artist||'—')} — ${escapeHtml(r.title||'—')}</div>
          <div class="rm">ожидалось: ${r.qty[warehouse]} шт.</div>
        </div>`).join('')
      : `<div class="report-row"><div class="rn" style="color:var(--good)">Все позиции найдены ✓</div></div>`;

    const unexpectedHtml = unexpectedRecords.length
      ? unexpectedRecords.map(r=>`
        <div class="report-row">
          <div class="rn">${escapeHtml(r.artist||'—')} — ${escapeHtml(r.title||'—')}</div>
          <div class="rm">не должно быть здесь</div>
        </div>`).join('')
      : `<div class="report-row"><div class="rn" style="color:var(--ink-dim)">Нет</div></div>`;

    const unknownHtml = unknownList.length
      ? unknownList.map(u=>`
        <div class="report-row">
          <div class="rn">${escapeHtml(u.barcode)}</div>
          <div class="rm">не в каталоге</div>
        </div>`).join('')
      : `<div class="report-row"><div class="rn" style="color:var(--ink-dim)">Нет</div></div>`;

    openSheet(`
      <div class="sheet-handle"></div>
      <div class="sheet-title">Отчёт: ${escapeHtml(warehouse)}</div>
      <div class="sheet-sub">${new Date(invSession.startedAt).toLocaleDateString('ru-RU')} — ${new Date().toLocaleDateString('ru-RU')}</div>

      <div class="inv-stats">
        <div class="inv-stat scanned"><div class="n">${scannedExpectedCount}/${totalPositions}</div><div class="l">Найдено позиций</div></div>
        <div class="inv-stat unexpected"><div class="n">${unexpectedRecords.length + unknownList.length}</div><div class="l">Странностей</div></div>
      </div>

      <div class="report-section">
        <div class="report-title">Не найдено на складе (${missingRecords.length})</div>
        ${missingHtml}
      </div>

      <div class="report-section">
        <div class="report-title">Найдено, но не ожидалось здесь (${unexpectedRecords.length})</div>
        ${unexpectedHtml}
      </div>

      <div class="report-section">
        <div class="report-title">Отсканировано, но нет в каталоге (${unknownList.length})</div>
        ${unknownHtml}
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" id="continue-inv-btn">Продолжить сессию</button>
        <button class="btn btn-primary" id="finish-session-btn">Завершить сессию</button>
      </div>
    `);

    document.getElementById('continue-inv-btn').onclick = closeSheet;
    document.getElementById('finish-session-btn').onclick = ()=>{
      invSession = null;
      saveInvSession(null);
      closeSheet();
      renderInventoryView();
      toast('Сессия инвентаризации завершена');
    };
  }

  /* ====================== INIT ====================== */
  const MIGRATION_FLAG_KEY = 'vinyl_mc_fields_fixed_v1';

  // One-time repair: older app versions sometimes split "Release name" into
  // artist/title incorrectly, leaving artist blank for rows without a clear
  // separator. This re-applies the correct Release name / Style from the
  // canonical MC_SEED_DATA, matched by barcode, without touching quantities.
  function maybeFixMcFields(){
    const alreadyFixed = localStorage.getItem(MIGRATION_FLAG_KEY);
    if(alreadyFixed) return;

    const seedByBarcode = {};
    MC_SEED_DATA.forEach(item=>{
      if(item.barcode) seedByBarcode[item.barcode] = item;
    });

    let fixedCount = 0;
    catalog.forEach(record=>{
      const seedItem = record.barcode ? seedByBarcode[record.barcode] : null;
      if(!seedItem) return;
      const needsFix = (record.artist || '') !== seedItem.artist || (record.title || '') !== seedItem.title;
      if(needsFix){
        record.artist = seedItem.artist || '';
        record.title = seedItem.title || '';
        if(seedItem.label) record.label = seedItem.label;
        if(seedItem.priceNote !== undefined && seedItem.priceNote !== '' && (record.priceNote === undefined || record.priceNote === '')){
          record.priceNote = seedItem.priceNote;
        }
        fixedCount++;
      }
    });

    if(fixedCount > 0){
      saveCatalog(catalog);
      toast(`Исправлены названия для ${fixedCount} позиций каталога`);
    }
    localStorage.setItem(MIGRATION_FLAG_KEY, '1');
  }

  function maybeSeedMcCatalog(){
    const alreadySeeded = localStorage.getItem(SEED_FLAG_KEY);
    if(alreadySeeded) return;
    if(catalog.length === 0){
      const existingBarcodes = new Set(catalog.map(r=>r.barcode));
      MC_SEED_DATA.forEach(item=>{
        if(item.barcode && existingBarcodes.has(item.barcode)) return;
        catalog.push({
          id: uid(),
          barcode: item.barcode,
          artist: item.artist || '',
          title: item.title || '',
          year: '',
          label: item.label || 'MC',
          condition: '',
          qty: { 'Lemonade bar': 1, 'WaxBrew Textura': 0, 'WaxBrew TreCanne': 0 },
          notes: item.notes || '',
          priceNote: item.priceNote !== undefined ? item.priceNote : '',
          addedAt: Date.now()
        });
      });
      saveCatalog(catalog);
      toast(`Загружен стартовый каталог MC: ${MC_SEED_DATA.length} позиций`);
    }
    localStorage.setItem(SEED_FLAG_KEY, '1');
  }

  // initAppWithFirebase is called by auth layer after login
  window.initAppWithFirebase = async function(){
    // Expose db reference for storage functions
    window.db = db;

    // Try to load from Firestore first (shared catalog)
    const remoteCatalog = await pullCatalogFromFirestore();
    if(remoteCatalog && remoteCatalog.length > 0){
      catalog = remoteCatalog;
      catalog.forEach(normalizeQty);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(catalog)); // cache only — no need to push back what we just read
    } else {
      // First time or offline — seed from local/MC data
      catalog.forEach(normalizeQty);
      maybeSeedMcCatalog();
      maybeFixMcFields();
      // Push seed data to Firestore so all users get it
      pushCatalogToFirestore(catalog);
    }

    updateHeaderCount();
    renderWarehouseFilter();
    renderCatalogList();

    // Subscribe to real-time catalog updates from Firestore
    if(window.catalogUnsubscribe) window.catalogUnsubscribe();
    window.catalogUnsubscribe = db.collection('catalog').onSnapshot(snap=>{
      if(snap.docChanges().length === 0) return;
      catalog = snap.docs.map(d=>d.data());
      catalog.forEach(normalizeQty);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(catalog)); // cache only — data already came from the server
      updateHeaderCount();
      renderCatalogList();
      if(currentTab === 'inventory') renderInventoryView();
    }, err=>console.warn('Catalog listener error:', err));
  };

  // Add admin panel button to header if admin
  const adminBtn = document.getElementById('admin-btn');
  if(adminBtn){
    adminBtn.addEventListener('click', ()=> window.openAdminPanel && window.openAdminPanel());
  }

  // Safety net: if the primary CDN for the scanner library failed to load for
  // any reason (network hiccup, regional block, etc.), try one alternate CDN
  // before the user ever taps the scan button. Both serve the same library.
  if(typeof window.ZXing === 'undefined'){
    const fallbackScript = document.createElement('script');
    fallbackScript.src = 'https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';
    fallbackScript.onerror = ()=>{
      console.warn('Не удалось загрузить библиотеку сканера ни с одного источника.');
    };
    document.head.appendChild(fallbackScript);
  }

})();

</script>
